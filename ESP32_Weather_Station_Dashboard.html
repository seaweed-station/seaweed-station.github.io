<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>if(sessionStorage.getItem('sw_auth')!=='ok'){location.replace('login.html?r='+encodeURIComponent(location.href));}</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seaweed Station Overview</title>
<script src="pages/seaweed_common.js"></script>
<style>
/* -- CSS Variables ------------------------------------------------- */
:root {
  --bg: #eef8f5; --bg-card: #ffffff; --bg-hover: #e5f2ee;
  --text: #12362f; --text-sec: #457c72; --text-muted: #6d8f88;
  --border: #bfded6; --radius: 12px;
  --accent: #2f89b7; --success: #1f9d6c; --warning: #d0892d; --danger: #d04f5f;
  --success-dim: #dff5eb; --warning-dim: #fff1dd; --danger-dim: #ffe4e8;
  --shadow: 0 4px 14px rgba(25, 81, 77, 0.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: linear-gradient(180deg, #e8f5f1 0%, #f5fbf9 100%); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.5; }
body.loading-state { background: #edf4f1; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* -- Header -------------------------------------------------------- */
.header {
  background: linear-gradient(135deg, #d9f0e9 0%, #dbeef8 100%);
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.header-left h1 { font-size: 1.3rem; font-weight: 700; }
.header-left .sub { font-size: 0.8rem; color: var(--text-sec); }
.brand-icon { width: 36px; height: 36px; display: block; }
.header-actions { display: flex; gap: 8px; align-items: center; }

/* -- Buttons ------------------------------------------------------- */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border);
  background: #ffffff; color: var(--text); font-size: 0.82rem; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.btn:hover { background: var(--bg-hover); border-color: var(--accent); }
.btn-sm { padding: 4px 10px; font-size: 0.75rem; }
.btn-primary { background: var(--success); color: #fff; border-color: var(--success); }
.btn-primary:hover { background: #16a34a; border-color: #16a34a; }
.fetch-status { font-size: 0.72rem; color: var(--text-sec); }
.source-badge {
  display: inline-block; padding: 1px 6px; border-radius: 4px;
  font-size: 0.6rem; font-weight: 600; text-transform: uppercase; margin-left: 6px;
}
.source-live { background: var(--success-dim); color: var(--success); }
.source-cache { background: var(--warning-dim); color: var(--warning); }
.source-file { background: #1e293b; color: var(--text-muted); border: 1px solid var(--border); }
.auto-refresh-label { font-size: 0.65rem; color: var(--text-muted); }

/* -- Main layout --------------------------------------------------- */
.main { max-width: 1400px; margin: 0 auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 24px; }
.main.loading-state {
  min-height: calc(100vh - 170px);
}

/* -- Table cards --------------------------------------------------- */
.table-grid { display: flex; flex-direction: column; gap: 14px; }
.table-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  box-shadow: var(--shadow); transition: border-color 0.2s;
  display: flex; flex-direction: column; gap: 10px;
  cursor: pointer; position: relative; overflow: hidden;
}
.table-card:hover { border-color: var(--accent); }
.table-card::before {
  content: ''; position: absolute; left: 0; top: 0; right: 0; height: 3px;
  background: #a9cfc5;
}
.table-card.status-ok {
  border-color: var(--border);
  background: var(--bg-card);
}
.table-card.status-ok::before { background: var(--success); }
.table-card.status-warn {
  border-color: var(--border);
  background: var(--bg-card);
}
.table-card.status-warn::before { background: var(--warning); }
.table-card.status-err {
  border-color: var(--border);
  background: var(--bg-card);
}
.table-card.status-err::before { background: var(--danger); }
.table-card.status-nc {
  border-color: var(--border);
  background: var(--bg-card);
}
.table-card.status-nc::before { background: #a9cfc5; }
.table-card.status-paused::before { background: var(--warning); }
.table-card.status-finished::before { background: var(--success); }
.table-card-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.table-card-header h2 { font-size: 1.15rem; font-weight: 700; }
.table-card-header .location { font-size: 0.78rem; color: var(--text-sec); }
.table-card-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.status-time { font-size: 0.78rem; color: var(--text-sec); }
.next-check { font-weight: 600; }
.next-check-good { color: var(--success); }
.next-check-warn { color: var(--warning); }
.next-check-late { color: var(--danger); }
.next-check-unknown { color: var(--text-muted); }
.next-check-paused { color: var(--text-sec); }
.station-metrics { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
.table-badge {
  display: inline-block; padding: 3px 10px; border-radius: 12px;
  font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
}
.badge-ok { background: var(--success-dim); color: var(--success); }
.badge-warn { background: var(--warning-dim); color: var(--warning); }
.badge-err { background: var(--danger-dim); color: var(--danger); }
.badge-nc { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }
.badge-paused { background: var(--warning-dim); color: var(--warning); }
.badge-finished { background: var(--success-dim); color: var(--success); }

/* -- Metrics grid -------------------------------------------------- */
.metrics-grid { display: contents; }
.metric-box { background: var(--bg); border-radius: 8px; padding: 8px 10px; text-align: left; min-width: 145px; }
.metric-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
.metric-value { font-size: 1rem; font-weight: 700; margin-top: 1px; }
.metric-sub { font-size: 0.65rem; color: var(--text-muted); }
.metric-value.bat-green { color: var(--success); }
.metric-value.bat-yellow { color: var(--warning); }
.metric-value.bat-red { color: var(--danger); }
.station-metrics .metric-box { border-top: 2px solid #d5e8e2; }
.metric-group {
  background: var(--bg); border-radius: 8px; padding: 6px 8px;
  min-width: 260px; border-top: 2px solid #d5e8e2;
  display: flex; flex-direction: column; gap: 6px;
}
.metric-group-title {
  font-size: 0.62rem; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.06em; font-weight: 700;
}
.metric-group-row { display: flex; gap: 8px; }
.metric-group .metric-box {
  border-top: none; min-width: 110px; flex: 1;
  background: #f7fcfa; padding: 7px 8px;
}

/* -- Node health row ----------------------------------------------- */
.node-row { display: flex; gap: 10px; flex-wrap: wrap; }
.node-chip {
  flex: 1; min-width: 100px; background: var(--bg); border-radius: 8px; padding: 6px 10px;
  display: flex; align-items: center; gap: 6px;
}
.node-chip .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-green { background: var(--success); }
.dot-yellow { background: var(--warning); }
.dot-red { background: var(--danger); }
.dot-grey { background: var(--text-muted); }
.node-chip .node-name { font-size: 0.72rem; font-weight: 600; }
.node-chip .node-bat { font-size: 0.72rem; color: var(--text-sec); margin-left: auto; }
.node-chip .node-fw { font-size: 0.6rem; color: var(--text-muted); margin-left: 6px; opacity: 0.8; }

/* -- Mini spark chart ---------------------------------------------- */
.spark-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.spark-range-btns { display: flex; gap: 3px; }
.spark-range-btn {
  font-size: 0.6rem; padding: 2px 7px; border: 1px solid var(--border);
  background: transparent; color: var(--text-muted); border-radius: 4px;
  cursor: pointer; line-height: 1.6;
}
.spark-range-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.spark-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.spark-box { background: var(--bg); border-radius: 8px; padding: 8px; min-width: 0; overflow: hidden; }
.spark-title { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
.spark-wrap { height: 60px; position: relative; }

/* -- Weather summary (no-data cards) ------------------------------- */
.weather-summary { display: flex; flex-direction: column; gap: 10px; }
.weather-summary .wx-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.weather-summary .wx-current { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: var(--bg); border-radius: 8px; }
.weather-summary .wx-icon { font-size: 2rem; line-height: 1; }
.weather-summary .wx-temp { font-size: 1.4rem; font-weight: 700; }
.weather-summary .wx-desc { font-size: 0.75rem; color: var(--text-sec); }
.weather-summary .wx-detail { font-size: 0.72rem; color: var(--text-muted); }
.wx-forecast-row { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0; }
.wx-forecast-day { flex: 0 0 auto; background: var(--bg); border-radius: 8px; padding: 8px 10px; text-align: center; min-width: 70px; }
.wx-forecast-day .wx-f-day { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
.wx-forecast-day .wx-f-icon { font-size: 1.2rem; margin: 2px 0; }
.wx-forecast-day .wx-f-temp { font-size: 0.78rem; font-weight: 600; }
.wx-forecast-day .wx-f-lo { font-size: 0.68rem; color: var(--text-muted); }

/* -- Loading ------------------------------------------------------- */
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  vertical-align: middle; margin-right: 4px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 0.8rem; color: var(--text-muted); padding: 16px; text-align: center; }
.loading-panel {
  background: #f2f7f4;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  min-height: 320px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* -- Footer -------------------------------------------------------- */
.footer { text-align: center; padding: 20px; font-size: 0.75rem; color: var(--text-muted); }

/* -- Diagnostics --------------------------------------------------- */
.diag-panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.diag-panel summary {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  cursor: pointer;
  list-style: none;
  padding: 12px 16px;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-sec);
}
.diag-panel summary::-webkit-details-marker { display: none; }
.diag-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 10px;
  padding: 0 16px 16px;
}
.diag-item {
  background: var(--bg);
  border-radius: 8px;
  padding: 8px 10px;
}
.diag-label {
  font-size: 0.66rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.diag-value {
  margin-top: 2px;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  word-break: break-word;
}
.diag-value-warn { color: var(--warning); }
.diag-value-error { color: var(--danger); }
.diag-value-good { color: var(--success); }
.diag-pill {
  margin-left: auto;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 0.66rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.diag-good { background: var(--success-dim); color: var(--success); }
.diag-warn { background: var(--warning-dim); color: var(--warning); }
.diag-error { background: var(--danger-dim); color: var(--danger); }
.diag-muted { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }
.diag-message {
  margin: 0 16px 16px;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 0.76rem;
}
.diag-message-note {
  background: var(--bg);
  color: var(--text-sec);
}
.diag-message-error {
  background: var(--danger-dim);
  color: var(--danger);
}

/* -- Responsive ---------------------------------------------------- */
@media (max-width: 768px) {
  .header { padding: 12px 16px; }
  .main { padding: 12px; gap: 12px; }
  .metric-box { min-width: 130px; }
}
</style>
</head>
<body>

<script>
// =====================================================================
// TABLE DEFINITIONS
// =====================================================================

// Read per-device profile config from settings (deviceProfiles in localStorage)
function getDeviceProfileConfig(tableId) {
  try {
    var s = JSON.parse(localStorage.getItem('seaweed_dashboard_config'));
    if (s && s.deviceProfiles && s.deviceProfiles.length) {
      var p = s.deviceProfiles.find(function(dp) { return dp.id === tableId; });
      if (p) {
        return {
          dataFolder: p.dataFolder || ''
        };
      }
    }
  } catch (e) {}
  return null;
}

var TABLES_DEFAULT = STATION_REGISTRY.map(function(s) {
  return {
    id: s.id,
    name: s.name,
    location: s.location,
    page: 'pages/station.html?table=' + encodeURIComponent(s.id),
    dataFile: 'data/' + s.dataFolder + '/merged_data.js',
    weather: (s.lat != null && s.lon != null) ? { lat: s.lat, lon: s.lon } : { lat: 0, lon: 0 },
    hasSatellite: s.hasSatellite !== false
  };
});

function buildConfiguredTables() {
  var baseMap = {};
  TABLES_DEFAULT.forEach(function(t) {
    baseMap[t.id] = Object.assign({}, t);
  });

  var configured = [];
  if (typeof getConfiguredDeviceProfiles === 'function') {
    configured = getConfiguredDeviceProfiles({ includeDisabled: false });
  }

  var tables;
  if (configured && configured.length) {
    tables = configured.map(function(p) {
      var base = baseMap[p.id] || {
        id: p.id,
        name: p.name || p.id,
        location: 'Configured station',
        page: 'pages/station.html?table=' + encodeURIComponent(p.id),
        dataFile: 'data/' + (p.dataFolder || ('data_' + p.id)) + '/merged_data.js',
        weather: { lat: 0, lon: 0 },
        hasSatellite: true
      };
      var out = Object.assign({}, base);
      if (p.name) out.name = p.name;
      if (p.dataFolder) out.dataFile = 'data/' + p.dataFolder + '/merged_data.js';
      out.page = 'pages/station.html?table=' + encodeURIComponent(p.id);
      if (typeof p.hasSatellite === 'boolean') out.hasSatellite = p.hasSatellite;
      return out;
    });
  } else {
    tables = TABLES_DEFAULT.map(function(t) { return Object.assign({}, t); });
  }

  tables.forEach(function(t) {
    var dp = getDeviceProfileConfig(t.id);
    if (dp) {
      if (dp.dataFolder) t.dataFile = 'data/' + dp.dataFolder + '/merged_data.js';
    }
  });

  return tables;
}

var TABLES = buildConfiguredTables();
var _sharedProfilesOverviewReloaded = false;

if (typeof onSharedDeviceProfilesUpdated === 'function') {
  onSharedDeviceProfilesUpdated(function(detail) {
    if (!detail || !detail.changed || _sharedProfilesOverviewReloaded) return;
    _sharedProfilesOverviewReloaded = true;
    location.reload();
  });
}

// Role-based station filtering
if (typeof filterStationsForRole === 'function') {
  TABLES = filterStationsForRole(TABLES);
}
if (typeof applyNavVisibility === 'function') applyNavVisibility();

if (!TABLES.length) {
  TABLES = TABLES_DEFAULT.map(function(t) {
    var c = Object.assign({}, t);
    var dp = getDeviceProfileConfig(c.id);
    if (dp) {
      if (dp.dataFolder) c.dataFile = 'data/' + dp.dataFolder + '/merged_data.js';
    }
    return c;
  });
}

TABLES.forEach(function(t) {
  if (!t.page) {
    t.page = 'pages/station.html?table=' + encodeURIComponent(t.id);
  }
});

// =====================================================================
// UTILITY: Parse feed entry into usable values
// =====================================================================
function parseEntry(f) {
  // Already-parsed entry object from cache
  if (f && f.timestamp !== undefined && f.t0BatPct !== undefined) {
    var parsedTs = f.timestamp instanceof Date ? f.timestamp : new Date(f.timestamp);
    if (isNaN(parsedTs.getTime()) && f.created_at) parsedTs = new Date(f.created_at);
    if (isFutureTimestamp(parsedTs)) return null;
    var out = Object.assign({}, f);
    out.timestamp = parsedTs;
    return out;
  }

  // Structured feed object (named properties)
  if (f && f.field1 === undefined && (f.battery_pct !== undefined || f.recorded_at !== undefined)) {
    var st = new Date(f.created_at || f.recorded_at);
    if (isFutureTimestamp(st)) return null;
    return {
      timestamp: st,
      t0BatPct: numParse(f.battery_pct),
      t0BatV: numParse(f.battery_v),
      t0Temp1: numParse(f.temp_1), t0Temp2: numParse(f.temp_2), t0Temp3: null,
      t0Hum1: numParse(f.humidity_1), t0Hum2: numParse(f.humidity_2), t0Hum3: null,
      sat1BatPct: numParse(f.sat_1_battery_pct), sat1BatV: numParse(f.sat_1_battery_v),
      sat1Temp1: numParse(f.sat_1_temp_1), sat1Temp2: numParse(f.sat_1_temp_2),
      sat1Hum1: numParse(f.sat_1_humidity_1), sat1Hum2: numParse(f.sat_1_humidity_2),
      sat2BatPct: numParse(f.sat_2_battery_pct), sat2BatV: numParse(f.sat_2_battery_v),
      sat2Temp1: numParse(f.sat_2_temp_1), sat2Temp2: numParse(f.sat_2_temp_2),
      sat2Hum1: numParse(f.sat_2_humidity_1), sat2Hum2: numParse(f.sat_2_humidity_2),
      t0FwVersion: f.fw_version ? String(f.fw_version) : null,
      t0BuildDate: f.fw_date ? String(f.fw_date) : null,
      sat1FwVersion: f.sat_1_fw_ver ? String(f.sat_1_fw_ver) : null,
      sat2FwVersion: f.sat_2_fw_ver ? String(f.sat_2_fw_ver) : null,
    };
  }

  var ts = new Date(f.created_at);
  if (isFutureTimestamp(ts)) return null;
  var t0Sensors = csvParse(f.field2);
  var t0Status  = csvParse(f.field3);
  var slot1Stat  = csvParse(f.field4);
  var slot1Sens  = csvParse(f.field5);
  var slot2Stat  = csvParse(f.field6);
  var slot2Sens  = csvParse(f.field7);

  // Extract firmware versions (string values, not numeric)
  var slot1Fw = null, slot2Fw = null, t0Fw = null, t0BuildDate = null;
  if (f.field4) {
    var parts4 = f.field4.split(',');
    if (parts4.length > 6 && parts4[6]) slot1Fw = parts4[6].trim();
  }
  if (f.field6) {
    var parts6 = f.field6.split(',');
    if (parts6.length > 6 && parts6[6]) slot2Fw = parts6[6].trim();
  }
  if (f.field8) {
    var sections = f.field8.split('|');
    if (sections.length > 2) {
      var fwParts = sections[2].split(',');
      t0Fw = fwParts[0] ? fwParts[0].trim() : null;
      t0BuildDate = fwParts[1] ? fwParts[1].trim() : null;
    }
  }

  return {
    timestamp: ts,
    t0BatPct: numParse(f.field1),
    t0BatV: t0Status[0] || null,
    t0Temp1: t0Sensors[0], t0Temp2: t0Sensors[2], t0Temp3: t0Sensors[4],
    t0Hum1: t0Sensors[1], t0Hum2: t0Sensors[3], t0Hum3: t0Sensors[5],
    sat1BatPct: slot1Stat[1], sat1BatV: slot1Stat[0],
    sat1Temp1: slot1Sens[0], sat1Temp2: slot1Sens[2],
    sat2BatPct: slot2Stat[1], sat2BatV: slot2Stat[0],
    sat2Temp1: slot2Sens[0], sat2Temp2: slot2Sens[2],
    t0FwVersion: t0Fw,
    t0BuildDate: t0BuildDate,
    sat1FwVersion: slot1Fw,
    sat2FwVersion: slot2Fw,
  };
}

function findLast(entries, key) {
  for (var i = entries.length - 1; i >= 0; i--) {
    if (entries[i][key] != null) return entries[i];
  }
  return null;
}

function formatDatasetUpdate(ts) {
  if (!ts) return { value: '--', sub: 'No dataset timestamp', hoursSince: null };
  var d = ts instanceof Date ? ts : new Date(ts);
  if (isNaN(d.getTime())) return { value: '--', sub: 'Invalid timestamp', hoursSince: null };

  var abs = d.toLocaleString('en-GB', {
    year: 'numeric', month: 'short', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false
  });

  var mins = Math.max(0, Math.round((Date.now() - d.getTime()) / 60000));
  var hoursSince = mins / 60;
  var rel;
  if (mins < 1) rel = 'just now';
  else if (mins < 60) rel = mins + 'm ago';
  else {
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) rel = hrs + 'h ago';
    else rel = Math.floor(hrs / 24) + 'd ago';
  }

  return { value: abs, sub: rel, hoursSince: hoursSince };
}

function formatStatusTime(updateInfo) {
  if (!updateInfo || !updateInfo.value) return '--';
  if (updateInfo.hoursSince == null || !isFinite(updateInfo.hoursSince)) return updateInfo.value;
  return updateInfo.value + ' (' + updateInfo.hoursSince.toFixed(1) + 'h)';
}

function formatEtaMinutes(mins) {
  var abs = Math.max(0, Math.round(Math.abs(mins)));
  if (abs < 60) return abs + 'm';
  var h = Math.floor(abs / 60);
  var m = abs % 60;
  return m ? (h + 'h ' + m + 'm') : (h + 'h');
}

function formatDatasetEndUtcLabel(endMs) {
  if (!isFinite(endMs)) return '--';
  return new Date(endMs).toLocaleString('en-GB', {
    day: '2-digit', month: 'short',
    hour: '2-digit', minute: '2-digit', hour12: false,
    timeZone: 'UTC'
  }) + ' UTC';
}

function escHtml(str) {
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(String(str == null ? '' : str)));
  return d.innerHTML;
}

var NEXT_CHECK_PIPELINE_BUFFER_MIN = 12;

function formatNextCheckIn(tableId, lastUpdate, dataHealth) {
  var datasetMeta = typeof getStationDatasetState === 'function' ? getStationDatasetState(tableId) : null;
  if (datasetMeta && datasetMeta.isActive) {
    var pauseText = datasetMeta.note || datasetMeta.statusLabel;
    return {
      html: '<span class="next-check next-check-paused">' + escHtml(pauseText) + '</span>',
      text: pauseText
    };
  }
  var statusRow = _deviceStatusById && _deviceStatusById[tableId] ? _deviceStatusById[tableId] : null;
  var nextFromStatus = statusRow && statusRow.nextCheckInAt ? statusRow.nextCheckInAt : null;
  if (nextFromStatus && !isNaN(nextFromStatus.getTime())) {
    var authDeltaMin = Math.round((nextFromStatus.getTime() - Date.now()) / 60000);
    var authState = 'good';
    var authWhen;
    if (authDeltaMin >= 0) {
      authState = 'good';
      authWhen = 'in ' + formatEtaMinutes(authDeltaMin);
    } else if (Math.abs(authDeltaMin) <= NEXT_CHECK_PIPELINE_BUFFER_MIN) {
      authState = 'warn';
      authWhen = 'pending ingest';
    } else {
      authState = 'late';
      authWhen = 'overdue by ' + formatEtaMinutes(Math.abs(authDeltaMin) - NEXT_CHECK_PIPELINE_BUFFER_MIN);
    }
    var authAbs = nextFromStatus.toLocaleString('en-GB', {
      hour: '2-digit', minute: '2-digit', hour12: false,
      timeZone: 'UTC'
    });
    var authCls = authState === 'good' ? 'next-check-good' : (authState === 'warn' ? 'next-check-warn' : 'next-check-late');
    var authText = 'Next check in: ' + authWhen + ' (' + authAbs + ' UTC)';
    return { html: '<span class="next-check ' + authCls + '">' + authText + '</span>', text: authText };
  }

  if (!lastUpdate || !dataHealth || !dataHealth.expected) {
    return { html: '<span class="next-check next-check-unknown">Next check in: --</span>', text: 'Next check in: --' };
  }
  var last = lastUpdate instanceof Date ? lastUpdate : new Date(lastUpdate);
  if (isNaN(last.getTime())) {
    return { html: '<span class="next-check next-check-unknown">Next check in: --</span>', text: 'Next check in: --' };
  }

  var cadenceMin = Math.max(1, Math.round((24 * 60) / dataHealth.expected));
  var nextAt = new Date(last.getTime() + cadenceMin * 60000);
  var deltaMin = Math.round((nextAt.getTime() - Date.now()) / 60000);
  var state = 'good';
  var when;
  if (deltaMin >= 0) {
    state = 'good';
    when = 'in ' + formatEtaMinutes(deltaMin);
  } else if (Math.abs(deltaMin) <= NEXT_CHECK_PIPELINE_BUFFER_MIN) {
    state = 'warn';
    when = 'pending ingest';
  } else {
    state = 'late';
    when = 'overdue by ' + formatEtaMinutes(Math.abs(deltaMin) - NEXT_CHECK_PIPELINE_BUFFER_MIN);
  }
  var nextAbs = nextAt.toLocaleString('en-GB', {
    hour: '2-digit', minute: '2-digit', hour12: false,
    timeZone: 'UTC'
  });
  var cls = state === 'good' ? 'next-check-good' : (state === 'warn' ? 'next-check-warn' : 'next-check-late');
  var text = 'Next check in: ' + when + ' (' + nextAbs + ' UTC)';
  return { html: '<span class="next-check ' + cls + '">' + text + '</span>', text: text };
}

// =====================================================================
// COMPUTE SUMMARY for a table
// =====================================================================
function computeDataHealth(entries, nowMs) {
  var now = nowMs || Date.now();
  var h24 = entries.filter(function(e) { return (now - e.timestamp.getTime()) < 86400000; });
  var actual = h24.length;
  if (!actual) return { actual: 0, expected: 0, pct: null };

  var diffs = [];
  for (var i = 1; i < h24.length; i++) {
    var d = (h24[i].timestamp.getTime() - h24[i - 1].timestamp.getTime()) / 60000;
    if (d > 0 && d <= 360) diffs.push(d);
  }
  diffs.sort(function(a, b) { return a - b; });
  var cadence = diffs.length ? diffs[Math.floor(diffs.length / 2)] : 15;
  if (!cadence || cadence < 1) cadence = 15;

  var expected = Math.max(1, Math.round((24 * 60) / cadence));
  var pct = Math.max(0, Math.min(100, (actual / expected) * 100));
  return { actual: actual, expected: expected, pct: pct };
}

function computeSummary(tableId, entries) {
  if (!entries || entries.length === 0) return null;

  var latest = entries[entries.length - 1];
  var now = Date.now();
  var anchorMs = typeof getStationAnalysisAnchorMs === 'function'
    ? getStationAnalysisAnchorMs(tableId, now)
    : now;
  var latestMs = latest.timestamp.getTime();
  // Anchor peak windows to the latest datapoint so stale tables still show recent peaks.
  var h24 = entries.filter(function(e) {
    var ts = e.timestamp.getTime();
    return ts <= latestMs && (latestMs - ts) < 86400000;
  });
  var w7  = entries.filter(function(e) { return (anchorMs - e.timestamp.getTime()) < 7 * 86400000; });
  var m30 = entries.filter(function(e) { return (anchorMs - e.timestamp.getTime()) < 30 * 86400000; });
  var health = computeDataHealth(entries, anchorMs);

  function peak(arr, keys) {
    var max = null;
    for (var i = 0; i < arr.length; i++) {
      for (var k = 0; k < keys.length; k++) {
        var v = arr[i][keys[k]];
        if (v != null && (max === null || v > max)) max = v;
      }
    }
    return max;
  }
  function minVal(arr, keys) {
    var min = null;
    for (var i = 0; i < arr.length; i++) {
      for (var k = 0; k < keys.length; k++) {
        var v = arr[i][keys[k]];
        if (v != null && (min === null || v < min)) min = v;
      }
    }
    return min;
  }

  // Compute across any available sensor values (T0 + satellite channels).
  var tempKeys = ['t0Temp1', 't0Temp2', 't0Temp3', 'sat1Temp1', 'sat1Temp2', 'sat2Temp1', 'sat2Temp2'];
  var humKeys = ['t0Hum1', 't0Hum2', 't0Hum3', 'sat1Hum1', 'sat1Hum2', 'sat2Hum1', 'sat2Hum2'];

  // Freshness: online <=24h, stale 24-48h, offline >48h.
  var ageMins = (now - latest.timestamp.getTime()) / 60000;
  var freshness = ageMins <= (24 * 60) ? 'ok' : (ageMins <= (48 * 60) ? 'warn' : 'err');

  // Node health
  var lastT0  = findLast(entries, 't0BatPct');
  var lastSlot1 = findLast(entries, 'sat1BatPct');
  var lastSlot2 = findLast(entries, 'sat2BatPct');

  function nodeHealth(lastEntry, batKey, fwKey) {
    if (!lastEntry) return { status: 'nc', bat: null, lastSeen: null, fw: null };
    var bat = lastEntry[batKey];
    var status = 'yellow';
    if (bat !== null) {
      if (bat > 80) status = 'green';
      else if (bat < 30) status = 'red';
      else status = 'yellow';
    }
    return { status: status, bat: bat, lastSeen: lastEntry.timestamp, fw: lastEntry[fwKey] || null };
  }

  return {
    freshness: freshness,
    lastUpdate: latest.timestamp,
    entries: entries.length,
    t0: nodeHealth(lastT0, 't0BatPct', 't0FwVersion'),
    slot1: nodeHealth(lastSlot1, 'sat1BatPct', 'sat1FwVersion'),
    slot2: nodeHealth(lastSlot2, 'sat2BatPct', 'sat2FwVersion'),
    dataHealth: health,
    dayTempHigh:  peak(h24, tempKeys),
    dayTempLow:   minVal(h24, tempKeys),
    dayHumHigh:   peak(h24, humKeys),
    weekTempHigh: peak(w7, tempKeys),
    weekHumHigh:  peak(w7, humKeys),
    monthTempHigh: peak(m30, tempKeys),
    monthHumHigh:  peak(m30, humKeys),
  };
}

// =====================================================================
// RENDER TABLE CARD (original Perth-style)
// =====================================================================
function renderTableCard(table, summary) {
  var card = document.createElement('div');
  card.className = 'table-card';
  card.onclick = function() { window.location.href = table.page; };
  var datasetMeta = typeof getStationDatasetState === 'function' ? getStationDatasetState(table.id) : null;
  var datasetEndLabel = datasetMeta && datasetMeta.isActive ? formatDatasetEndUtcLabel(datasetMeta.endMs) : '';

  var noData = !summary;
  if (noData) {
    summary = {
      freshness: 'nc', lastUpdate: null, entries: 0,
      t0:   { status: 'nc', bat: null, lastSeen: null, fw: null },
      slot1: { status: 'nc', bat: null, lastSeen: null, fw: null },
      slot2: { status: 'nc', bat: null, lastSeen: null, fw: null },
      dataHealth: { actual: 0, expected: 0, pct: null },
      dayTempHigh: null, dayTempLow: null, dayHumHigh: null,
      weekTempHigh: null, weekHumHigh: null,
      monthTempHigh: null, monthHumHigh: null,
    };
  }

  var badgeClass, badgeText;
  if (noData) { badgeClass = 'badge-nc'; badgeText = 'No Data'; }
  else if (datasetMeta && datasetMeta.isActive) {
    badgeClass = datasetMeta.status === 'finished' ? 'badge-finished' : 'badge-paused';
    badgeText = datasetMeta.pillLabel;
  }
  else {
    badgeClass = summary.freshness === 'ok' ? 'badge-ok' : (summary.freshness === 'warn' ? 'badge-warn' : 'badge-err');
    badgeText  = summary.freshness === 'ok' ? 'Online' : (summary.freshness === 'warn' ? 'Stale' : 'Offline');
  }
  card.className = 'table-card status-' + (noData ? 'nc' : ((datasetMeta && datasetMeta.isActive) ? datasetMeta.status : summary.freshness));

  var fmt = function(v, unit, dp) {
    if (v === null || v === undefined) return '--';
    return v.toFixed(dp !== undefined ? dp : 1) + (unit || '');
  };
  var batteryToneClass = function(pct) {
    if (pct === null || pct === undefined || isNaN(pct)) return '';
    if (pct > 80) return 'bat-green';
    if (pct < 30) return 'bat-red';
    return 'bat-yellow';
  };
  var satLabel = '--';
  var satPctForTone = null;
  var slot1Val = summary.slot1 && summary.slot1.bat != null ? Math.round(summary.slot1.bat) + '%' : null;
  var slot2Val = summary.slot2 && summary.slot2.bat != null ? Math.round(summary.slot2.bat) + '%' : null;
  var slot1ValNum = summary.slot1 && summary.slot1.bat != null ? Number(summary.slot1.bat) : null;
  var slot2ValNum = summary.slot2 && summary.slot2.bat != null ? Number(summary.slot2.bat) : null;
  if (slot1Val && slot2Val) satLabel = '1 ' + slot1Val + ' / 2 ' + slot2Val;
  else if (slot1Val) satLabel = slot1Val;
  else if (slot2Val) satLabel = slot2Val;
  if (slot1ValNum !== null && slot2ValNum !== null) satPctForTone = Math.min(slot1ValNum, slot2ValNum);
  else if (slot1ValNum !== null) satPctForTone = slot1ValNum;
  else if (slot2ValNum !== null) satPctForTone = slot2ValNum;

  // Prefer latest sample battery; fallback to device_status when sample is missing.
  var statusRow = _deviceStatusById && _deviceStatusById[table.id] ? _deviceStatusById[table.id] : null;
  var t0LatestSamplePct = summary.t0 && summary.t0.bat != null ? Number(summary.t0.bat) : null;
  var t0DisplayPct = t0LatestSamplePct;
  if (t0DisplayPct === null && statusRow && statusRow.batteryPct != null && isFinite(statusRow.batteryPct)) {
    if (statusRow.batteryPct >= 0) t0DisplayPct = Number(statusRow.batteryPct);
    else t0DisplayPct = null; // -1 sentinel means unknown in device_status
  }
  var t0PluggedIn = (t0LatestSamplePct === 0);
  var t0BattSub = t0PluggedIn ? 'Plugged in (USB sample)' : '';

  var healthValue = summary.dataHealth && summary.dataHealth.pct != null ? summary.dataHealth.pct.toFixed(0) + '%' : '--';
  var healthSub = summary.dataHealth && summary.dataHealth.pct != null ?
    (summary.dataHealth.actual + '/' + summary.dataHealth.expected + ' samples (24h)') :
    'No samples in last 24h';
  if (datasetMeta && datasetMeta.isActive) {
    healthValue = datasetMeta.pillLabel;
    healthSub = datasetEndLabel + (datasetMeta.note ? ' | ' + datasetMeta.note : '');
  }
  var updateInfo = formatDatasetUpdate(summary.lastUpdate);
  var nextCheck = formatNextCheckIn(table.id, summary.lastUpdate, summary.dataHealth);

  var metrics =
    metricBox('T0 Batt', t0DisplayPct != null ? Math.round(t0DisplayPct) + '%': '--', t0BattSub, batteryToneClass(t0DisplayPct)) +
    (table.hasSatellite ? metricBox('Satellite Batt', satLabel, '', batteryToneClass(satPctForTone)) : '') +
    metricBox('Data Health', healthValue, healthSub) +
    metricGroup('Peak 24h',
      metricBox('Temp', fmt(summary.dayTempHigh, '\u00B0C')) +
      metricBox('Humidity', fmt(summary.dayHumHigh, '%'))
    ) +
    metricGroup('Peak 7 Days',
      metricBox('Temp', fmt(summary.weekTempHigh, '\u00B0C')) +
      metricBox('Humidity', fmt(summary.weekHumHigh, '%'))
    );

  var sourceTag = '';
  var src = _dataSource[table.id];
  if (src === 'edge')  sourceTag = '<span class="source-badge source-live">Edge</span>';
  else if (src === 'live')  sourceTag = '<span class="source-badge source-live">Live</span>';
  else if (src === 'cache') sourceTag = '<span class="source-badge source-cache">Cache</span>';
  else if (src === 'file')  sourceTag = '<span class="source-badge source-file">File</span>';

  card.innerHTML =
    '<div class="table-card-header">' +
      '<div><h2>' + table.name + '</h2><div class="location">' + table.location + '</div></div>' +
      '<div class="table-card-right">' +
        '<span class="table-badge ' + badgeClass + '">' + badgeText + '</span>' + sourceTag +
        '<span class="status-time">' + formatStatusTime(updateInfo) + ' | ' + nextCheck.html + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="station-metrics">' + metrics + '</div>';

  return card;
}

function metricBox(label, value, sub, valueClass) {
  return '<div class="metric-box"><div class="metric-label">' + label + '</div><div class="metric-value ' + (valueClass || '') + '">' + value + '</div>' +
    (sub ? '<div class="metric-sub">' + sub + '</div>' : '') + '</div>';
}

function metricGroup(title, contentHtml) {
  return '<div class="metric-group">' +
    '<div class="metric-group-title">' + title + '</div>' +
    '<div class="metric-group-row">' + contentHtml + '</div>' +
    '</div>';
}

var _dataSource = {};  // tableId -> 'edge'
var _autoRefreshTimer = null;
var _deviceStatusById = {}; // tableId -> device_status row summary

var OVERVIEW_DETAIL_POINTS = 2000;

function overviewDiagTone(source, error) {
  if (error) return 'error';
  if (source === 'edge') return 'good';
  if (source === 'edge-cache' || source === 'loading' || source === 'edge-detail-fallback') return 'warn';
  return 'muted';
}

function updateOverviewDiagnostics(patch) {
  _overviewDiagState = Object.assign({}, _overviewDiagState, patch || {});
  renderDashboardDiagnostics('dashboardDiagnosticsPanel', {

    pillTone: overviewDiagTone(_overviewDiagState.source, _overviewDiagState.error),
    rows: [
      { label: 'Source', value: _overviewDiagState.source || '--', tone: _overviewDiagState.error ? 'error' : (_overviewDiagState.source === 'edge' ? 'good' : '') },
      { label: 'Generated', value: dashboardDiagFormatUtc(_overviewDiagState.generatedAt) },
      { label: 'Data as of', value: dashboardDiagFormatUtc(_overviewDiagState.dataAsOf) },
      { label: 'Schema', value: _overviewDiagState.schemaVersion != null ? String(_overviewDiagState.schemaVersion) : '--' },
      { label: 'Partial', value: _overviewDiagState.partial == null ? '--' : (_overviewDiagState.partial ? 'true' : 'false'), tone: _overviewDiagState.partial ? 'warn' : 'good' },
      { label: 'Stations', value: _overviewDiagState.stationCount != null ? String(_overviewDiagState.stationCount) : '--' },
      { label: 'Fetch', value: dashboardDiagFormatDuration(_overviewDiagState.fetchDurationMs) },
      { label: 'Cache age', value: _overviewDiagState.cacheAgeS != null ? (_overviewDiagState.cacheAgeS + ' s') : '--' },
      { label: 'Last refresh', value: dashboardDiagFormatUtc(_overviewDiagState.lastRefreshAt) }
    ],
    error: _overviewDiagState.error || '',
    note: _overviewDiagState.note || ''
  });
}

// =====================================================================
// EDGE FUNCTION PATH (Sprint 2)
// =====================================================================

/**
 * Adapt one station object from dashboard_overview() RPC
 * into the summary shape that renderTableCard() expects.
 */
function edgeStationToSummary(st) {
  // Map RPC alert_state → the freshness key that renderTableCard expects.
  // Legacy uses: 'ok' | 'warn' | 'err' | (null → noData path).
  // RPC returns:  'ok' | 'warn' | 'err' | 'nc'.
  // 'nc' means "no contact / no data" — return null so renderTableCard
  // takes the noData branch (badge-nc, "No Data").
  var alertState = st.alert_state || 'nc';
  if (alertState === 'nc') return null;

  var freshness = alertState;
  var lastUpdate = st.last_sample_epoch ? new Date(st.last_sample_epoch) : null;

  // T0 battery from root-level battery_pct (hub's latest sample)
  var t0Bat = st.battery_pct != null ? Number(st.battery_pct) : null;

  // Satellite slot batteries from satellite_summary
  var slot1 = { status: 'nc', bat: null, lastSeen: null, fw: null };
  var slot2 = { status: 'nc', bat: null, lastSeen: null, fw: null };
  if (Array.isArray(st.satellite_summary)) {
    for (var i = 0; i < st.satellite_summary.length; i++) {
      var sl = st.satellite_summary[i];
      var target = sl.slot_number === 1 ? slot1 : (sl.slot_number === 2 ? slot2 : null);
      if (!target) continue;
      // Get battery from sensor_summary for this node rather than sync session
      var nodeKey = sl.node_id; // 'A' or 'B'
      var nodeSensor = st.sensor_summary && st.sensor_summary[nodeKey] ? st.sensor_summary[nodeKey] : null;
      var slotBat = nodeSensor && nodeSensor.battery_pct != null ? Number(nodeSensor.battery_pct) : null;
      var slotStatus = slotBat != null ? (slotBat > 80 ? 'green' : (slotBat < 30 ? 'red' : 'yellow')) : 'nc';
      target.status = slotStatus;
      target.bat = slotBat;
      target.lastSeen = sl.last_sync ? new Date(sl.last_sync) : null;
      target.fw = sl.fw_ver || null;
    }
  }

  // Data health from upload_count_24h
  var actual = st.upload_count_24h || 0;
  var expected = 144; // 24h / 10min = 144
  var healthPct = expected > 0 ? Math.min(100, (actual / expected) * 100) : null;

  // Sensor aggregates from sensor_summary
  var dayTempHigh = null, dayHumHigh = null;
  if (st.sensor_summary) {
    var keys = Object.keys(st.sensor_summary);
    for (var k = 0; k < keys.length; k++) {
      var node = st.sensor_summary[keys[k]];
      if (node && node.agg_24h) {
        var a = node.agg_24h;
        if (a.temp_1_max != null && (dayTempHigh === null || a.temp_1_max > dayTempHigh))
          dayTempHigh = Number(a.temp_1_max);
        if (a.humidity_1_max != null && (dayHumHigh === null || a.humidity_1_max > dayHumHigh))
          dayHumHigh = Number(a.humidity_1_max);
      }
    }
  }

  return {
    freshness: freshness,
    lastUpdate: lastUpdate,
    entries: actual,
    t0: {
      status: t0Bat != null ? (t0Bat > 80 ? 'green' : (t0Bat < 30 ? 'red' : 'yellow')) : 'nc',
      bat: t0Bat,
      lastSeen: lastUpdate,
      fw: st.fw_version || null
    },
    slot1: slot1,
    slot2: slot2,
    dataHealth: { actual: actual, expected: expected, pct: healthPct },
    dayTempHigh: dayTempHigh,
    dayTempLow: null,   // RPC returns max; low is not shown on card
    dayHumHigh: dayHumHigh,
    weekTempHigh: null,  // Not available from overview RPC (24h only)
    weekHumHigh: null,
    monthTempHigh: null,
    monthHumHigh: null,
  };
}

/**
 * Look up the TABLES entry for a given station_id.
 */
function findTableForStation(stationId) {
  for (var i = 0; i < TABLES.length; i++) {
    if (TABLES[i].id === stationId) return TABLES[i];
  }
  return null;
}

/**
 * Fetch from the dashboard-overview Edge Function and render cards.
 * Returns the payload, or null on failure.
 */
async function fetchEdgeOverview() {
  var startedAt = Date.now();
  var supaCfg = getSupabaseConfig();
  var url = supaCfg.url + '/functions/v1/dashboard-overview';
  var res = await fetchWithTimeout(url, 15000, {
    headers: {
      'Authorization': 'Bearer ' + supaCfg.key,
      'apikey': supaCfg.key
    }
  });
  if (!res.ok) {
    var body = null;
    try { body = await res.json(); } catch (_) {}
    var errMsg = body && body.error ? body.error : ('HTTP ' + res.status);
    throw new Error('Edge Function: ' + errMsg);
  }
  var payload = await res.json();
  payload._response_duration_ms = Date.now() - startedAt;
  return payload;
}

function getOverviewDataAgeMinutes(payload) {
  if (!payload || !payload.data_as_of) return null;
  var dataAsOf = new Date(payload.data_as_of);
  if (isNaN(dataAsOf.getTime())) return null;
  return (Date.now() - dataAsOf.getTime()) / 60000;
}

function isOverviewPayloadStale(payload) {
  var ageMin = getOverviewDataAgeMinutes(payload);
  return ageMin != null && ageMin > OVERVIEW_STALE_SUMMARY_MAX_AGE_MIN;
}

async function fetchStationDetailOverviewPayload(stationId) {
  var startedAt = Date.now();
  var supaCfg = getSupabaseConfig();
  var url = supaCfg.url + '/functions/v1/station-detail' +
    '?station_id=' + encodeURIComponent(stationId) +
    '&points=' + encodeURIComponent(String(OVERVIEW_DETAIL_POINTS));
  var res = await fetchWithTimeout(url, 20000, {
    headers: {
      'Authorization': 'Bearer ' + supaCfg.key,
      'apikey': supaCfg.key
    }
  });
  if (!res.ok) {
    var body = null;
    try { body = await res.json(); } catch (_) {}
    var errMsg = body && body.error ? body.error : ('HTTP ' + res.status);
    throw new Error('Edge Function (station-detail ' + stationId + '): ' + errMsg);
  }
  var payload = await res.json();
  if (payload && payload.source === 'error') {
    throw new Error(payload.error || ('station-detail failed for ' + stationId));
  }
  payload._response_duration_ms = Date.now() - startedAt;
  return payload;
}

function stationDetailPayloadToOverviewSummary(table, payload) {
  var feeds = payload && Array.isArray(payload.feeds) ? payload.feeds : [];
  var entries = [];
  for (var i = 0; i < feeds.length; i++) {
    var parsed = parseEntry(feeds[i]);
    if (parsed) entries.push(parsed);
  }
  entries.sort(function(a, b) { return a.timestamp - b.timestamp; });
  return {
    entries: entries,
    summary: computeSummary(table.id, entries),
    deviceStatus: payload && payload.device_status ? payload.device_status : null,
    dataAsOf: payload && payload.data_as_of ? payload.data_as_of : null,
    fetchDurationMs: payload && payload._response_duration_ms != null ? payload._response_duration_ms : null
  };
}

async function renderOverviewFromStationDetails(basePayload, contextLabel) {
  var grid = document.getElementById('tableGrid');
  var btn = document.getElementById('btnFetchAll');
  var statusEl = document.getElementById('fetchStatus');
  var startedAt = Date.now();

  if (btn) {
    btn.innerHTML = '<span class="spinner"></span> Refreshing...';
    btn.disabled = true;
  }
  if (statusEl) {
    statusEl.innerHTML = '<span style="color:var(--warning)">Overview summary is stale — rebuilding cards from station-detail feeds…</span>';
  }

  var stationsById = {};
  if (basePayload && Array.isArray(basePayload.stations)) {
    for (var i = 0; i < basePayload.stations.length; i++) {
      stationsById[basePayload.stations[i].station_id] = basePayload.stations[i];
    }
  }

  var jobs = TABLES.map(function(table) {
    return fetchStationDetailOverviewPayload(table.id)
      .then(function(payload) {
        return { table: table, ok: true, payload: payload };
      })
      .catch(function(err) {
        return { table: table, ok: false, error: err };
      });
  });

  var results = await Promise.all(jobs);
  var renderedCount = 0;
  var failureIds = [];
  var latestDataAsOfMs = null;
  var totalFetchDurationMs = 0;
  grid.innerHTML = '';

  for (var r = 0; r < results.length; r++) {
    var result = results[r];
    var table = result.table;
    var card = null;

    if (result.ok) {
      var derived = stationDetailPayloadToOverviewSummary(table, result.payload);
      if (derived.deviceStatus) {
        _deviceStatusById[table.id] = {
          batteryPct: derived.deviceStatus.battery_pct,
          nextCheckInAt: derived.deviceStatus.next_check_in ? new Date(derived.deviceStatus.next_check_in) : null,
          lastSeenAt: derived.deviceStatus.last_seen ? new Date(derived.deviceStatus.last_seen) : null,
          lastUploadAt: derived.deviceStatus.last_upload_at ? new Date(derived.deviceStatus.last_upload_at) : null,
          raw: derived.deviceStatus
        };
      }
      tableEntries[table.id] = derived.entries;
      _dataSource[table.id] = 'live';
      card = renderTableCard(table, derived.summary);
      renderedCount++;
      totalFetchDurationMs += derived.fetchDurationMs || 0;
      if (derived.dataAsOf) {
        var asOfMs = new Date(derived.dataAsOf).getTime();
        if (!isNaN(asOfMs) && (latestDataAsOfMs === null || asOfMs > latestDataAsOfMs)) {
          latestDataAsOfMs = asOfMs;
        }
      }
    } else {
      failureIds.push(table.id);
      var fallbackStation = stationsById[table.id] || null;
      if (fallbackStation) {
        _dataSource[table.id] = 'edge';
        card = renderTableCard(table, edgeStationToSummary(fallbackStation));
      } else {
        card = renderTableCard(table, null);
      }
      console.error('[Overview] station-detail fallback failed for ' + table.id + ':', result.error);
    }

    grid.appendChild(card);
  }

  if (btn) {
    btn.innerHTML = '&#128752; Fetch Live';
    btn.disabled = false;
  }

  var latestDataAsOf = latestDataAsOfMs != null ? new Date(latestDataAsOfMs).toISOString() : (basePayload ? basePayload.data_as_of : null);
  if (statusEl) {
    var refreshTs = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
    var liveTs = latestDataAsOf
      ? new Date(latestDataAsOf).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit'})
      : '?';
    var warnText = failureIds.length
      ? (' — partial fallback, failed: ' + failureIds.join(', '))
      : '';
    statusEl.innerHTML = '<span style="color:var(--warning)">' + renderedCount +
      ' stations via station-detail fallback — data as of ' + liveTs + ' — ' + refreshTs + warnText + '</span>';
  }

  updateOverviewDiagnostics({
    source: 'edge-detail-fallback',
    generatedAt: new Date(startedAt).toISOString(),
    dataAsOf: latestDataAsOf,
    schemaVersion: basePayload ? basePayload.schema_version : null,
    partial: failureIds.length > 0,
    stationCount: renderedCount,
    fetchDurationMs: Date.now() - startedAt,
    cacheAgeS: 0,
    lastRefreshAt: Date.now(),
    error: failureIds.length ? ('Fallback failed for: ' + failureIds.join(', ')) : '',
    note: 'dashboard-overview is stale, so cards were rebuilt from fresh station-detail feeds (' + contextLabel + ').'
  });

  return renderedCount > 0;
}

async function upgradeOverviewIfStale(payload, contextLabel) {
  if (!isOverviewPayloadStale(payload)) return false;
  return renderOverviewFromStationDetails(payload, contextLabel);
}

/**
 * Render overview cards from a cached Edge Function payload.
 */
function renderEdgeCards(payload) {
  var grid = document.getElementById('tableGrid');
  grid.innerHTML = '';

  if (!payload || !payload.stations || !payload.stations.length) {
    grid.innerHTML = '<div class="loading-text">No station data available.</div>';
    return;
  }

  var stations = payload.stations;
  for (var i = 0; i < stations.length; i++) {
    var st = stations[i];
    var table = findTableForStation(st.station_id);
    if (!table) continue; // skip stations not in TABLES (disabled by user)
    var summary = edgeStationToSummary(st);
    _dataSource[st.station_id] = 'edge';
    var card = renderTableCard(table, summary);
    grid.appendChild(card);
  }
}

/**
 * Edge Function fetch-all (sole data path for dashboard overview).
 */
async function fetchAllEdge() {
  var btn = document.getElementById('btnFetchAll');
  var statusEl = document.getElementById('fetchStatus');
  btn.innerHTML = '<span class="spinner"></span> Fetching...';
  btn.disabled = true;
  statusEl.textContent = '';
  updateOverviewDiagnostics({ source: 'loading', lastRefreshAt: Date.now(), error: '', note: 'Waiting for dashboard-overview payload…' });

  try {
    var payload = await fetchEdgeOverview();
    _edgePayload = payload;
    _edgePayloadAt = Date.now();

    // Also update _deviceStatusById from the edge payload so card rendering
    // has status data without a separate device_status fetch
    if (payload.stations) {
      for (var i = 0; i < payload.stations.length; i++) {
        var st = payload.stations[i];
        _deviceStatusById[st.station_id] = {
          batteryPct: st.battery_pct,
          nextCheckInAt: null,
          lastSeenAt: st.last_seen ? new Date(st.last_seen) : null,
          lastUploadAt: null,
          raw: st
        };
      }
    }

    var usedFallback = false;
    if (isOverviewPayloadStale(payload)) {
      usedFallback = await upgradeOverviewIfStale(payload, 'manual refresh');
      if (usedFallback) return;
    }

    renderEdgeCards(payload);

    var count = payload.stations ? payload.stations.length : 0;
    var partial = payload.partial ? ' (partial)' : '';
    var ts = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
    var dataOf = payload.data_as_of
      ? new Date(payload.data_as_of).toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit', second:'2-digit'})
      : '?';
    statusEl.innerHTML = '<span style="color:var(--success)">' + count +
      ' stations via Edge Function' + partial + ' — data as of ' + dataOf + ' — ' + ts + '</span>';
    updateOverviewDiagnostics({
      source: 'edge',
      generatedAt: payload.generated_at,
      dataAsOf: payload.data_as_of,
      schemaVersion: payload.schema_version,
      partial: payload.partial === true,
      stationCount: count,
      fetchDurationMs: payload._response_duration_ms,
      cacheAgeS: 0,
      lastRefreshAt: Date.now(),
      error: '',
      note: 'Single Edge Function payload. Browser should not query raw station tables on this page.'
    });
  } catch (err) {
    console.error('[Overview] Edge Function fetch failed:', err);
    // Stale-while-revalidate: re-render from cached payload if available
    if (_edgePayload) {
      renderEdgeCards(_edgePayload);
      var staleAge = Math.round((Date.now() - _edgePayloadAt) / 1000);
      statusEl.innerHTML = '<span style="color:var(--warning)">Edge failed — showing cached data (' + staleAge + 's old): ' +
        (err.message || 'Unknown error') + '</span>';
      updateOverviewDiagnostics({
        source: 'edge-cache',
        generatedAt: _edgePayload.generated_at,
        dataAsOf: _edgePayload.data_as_of,
        schemaVersion: _edgePayload.schema_version,
        partial: _edgePayload.partial === true,
        stationCount: _edgePayload.stations ? _edgePayload.stations.length : null,
        fetchDurationMs: _edgePayload._response_duration_ms,
        cacheAgeS: staleAge,
        lastRefreshAt: Date.now(),
        error: err.message || 'Edge fetch failed',
        note: 'Cached overview payload reused after live fetch failure.'
      });
    } else {
      statusEl.innerHTML = '<span style="color:var(--danger)">Edge Function unavailable: ' +
        (err.message || 'Unknown error') + '</span>';
      updateOverviewDiagnostics({
        source: 'error',
        stationCount: null,
        lastRefreshAt: Date.now(),
        error: err.message || 'Edge fetch failed',
        note: 'No cached overview payload available.'
      });
    }
  } finally {
    btn.innerHTML = '&#128752; Fetch Live';
    btn.disabled = false;
  }
}

/** Fetch all station data via Edge Function. */
function fetchAllLive() {
  return fetchAllEdge();
}

function renderAllCards() {
  var grid = document.getElementById('tableGrid');
  grid.innerHTML = '';
  if (!TABLES.length) {
    grid.innerHTML = '<div class="loading-text">No devices are enabled. Open Settings and enable at least one station.</div>';
    return;
  }
  for (var i = 0; i < TABLES.length; i++) {
    var table = TABLES[i];
    var entries = tableEntries[table.id];
    var card;
    if (entries && entries.length) {
      var summary = computeSummary(table.id, entries);
      card = renderTableCard(table, summary);
    } else {
      card = renderTableCard(table, null);
    }
    grid.appendChild(card);
  }
}

function setupAutoRefresh() {
  if (_autoRefreshTimer) clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = null;
  var label = document.getElementById('autoRefreshLabel');
  _autoRefreshTimer = setInterval(function() {
    console.log('[Overview] Auto-refresh triggered');
    fetchAllLive();
  }, 60000);
  if (label) label.textContent = 'Auto-refresh: every 1m';
}

// =====================================================================
// INITIALIZATION
// =====================================================================
async function init() {
  updateOverviewDiagnostics({ source: 'loading', lastRefreshAt: Date.now(), error: '', note: 'Overview page booting…' });
  document.body.classList.add('loading-state');
  var mainEl = document.querySelector('.main');
  if (mainEl) mainEl.classList.add('loading-state');
  var grid = document.getElementById('tableGrid');
  grid.innerHTML = '<div class="loading-panel"><div class="loading-text"><span class="spinner"></span> Loading table data...</div></div>';

  if (!TABLES.length) {
    renderAllCards();
    updateOverviewDiagnostics({ source: 'idle', stationCount: 0, error: '', note: 'No enabled stations in current role/config.' });
    document.body.classList.remove('loading-state');
    if (mainEl) mainEl.classList.remove('loading-state');
    setupAutoRefresh();
    return;
  }

  // ── Load from Edge Function ─────────────────────────────────
  try {
    var payload = await fetchEdgeOverview();
    _edgePayload = payload;
    _edgePayloadAt = Date.now();
    if (payload.stations) {
      for (var ei = 0; ei < payload.stations.length; ei++) {
        var est = payload.stations[ei];
        _deviceStatusById[est.station_id] = {
          batteryPct: est.battery_pct,
          nextCheckInAt: null,
          lastSeenAt: est.last_seen ? new Date(est.last_seen) : null,
          lastUploadAt: null,
          raw: est
        };
      }
    }

    var initUsedFallback = false;
    if (isOverviewPayloadStale(payload)) {
      initUsedFallback = await upgradeOverviewIfStale(payload, 'initial page load');
      if (initUsedFallback) {
        console.warn('[Overview] dashboard-overview payload stale; using station-detail fallback');
        setupAutoRefresh();
        document.body.classList.remove('loading-state');
        if (mainEl) mainEl.classList.remove('loading-state');
        return;
      }
    }

    renderEdgeCards(payload);

    console.log('[Overview] Loaded from Edge Function, ' +
      (payload.stations ? payload.stations.length : 0) + ' stations');
    updateOverviewDiagnostics({
      source: 'edge',
      generatedAt: payload.generated_at,
      dataAsOf: payload.data_as_of,
      schemaVersion: payload.schema_version,
      partial: payload.partial === true,
      stationCount: payload.stations ? payload.stations.length : null,
      fetchDurationMs: payload._response_duration_ms,
      cacheAgeS: 0,
      lastRefreshAt: Date.now(),
      error: '',
      note: 'Initial page load completed from dashboard-overview Edge Function.'
    });
  } catch (edgeErr) {
    console.error('[Overview] Edge init failed:', edgeErr.message);
    grid.innerHTML = '<div class="loading-text" style="color:var(--danger)">Could not load dashboard data: ' +
      (edgeErr.message || 'Unknown error') + '</div>';
    updateOverviewDiagnostics({
      source: 'error',
      lastRefreshAt: Date.now(),
      error: edgeErr.message || 'Overview init failed',
      note: 'Overview could not complete its initial Edge load.'
    });
  }

  // Start auto-refresh
  setupAutoRefresh();
  document.body.classList.remove('loading-state');
  if (mainEl) mainEl.classList.remove('loading-state');
}

document.addEventListener('DOMContentLoaded', init);

onDashboardDataRefresh(function(msg) {
  try {
    // Ignore our own broadcasts to avoid re-fetch loops
    if (msg && typeof msg.source === 'string' && msg.source.indexOf('overview.') === 0) return;
    // Another tab updated data — trigger a fresh edge fetch to stay current
    fetchAllEdge();
  } catch (e) {}
});
</script>
