<!DOCTYPE html>
<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seaweed Station Overview</title>
<!-- Chart.js + Luxon date adapter -->
<script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>

<style>
/* -- CSS Variables ------------------------------------------------- */
:root {
  --bg: #eef8f5; --bg-card: #ffffff; --bg-hover: #e5f2ee;
  --text: #12362f; --text-sec: #457c72; --text-muted: #6d8f88;
  --border: #bfded6; --radius: 12px;
  --accent: #2f89b7; --success: #1f9d6c; --warning: #d0892d; --danger: #d04f5f;
  --success-dim: #dff5eb; --warning-dim: #fff1dd; --danger-dim: #ffe4e8;
  --shadow: 0 4px 14px rgba(25, 81, 77, 0.10);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: linear-gradient(180deg, #e8f5f1 0%, #f5fbf9 100%); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.5; }
body.loading-state { background: #edf4f1; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* -- Header -------------------------------------------------------- */
.header {
  background: linear-gradient(135deg, #d9f0e9 0%, #dbeef8 100%);
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.header-left h1 { font-size: 1.3rem; font-weight: 700; }
.header-left .sub { font-size: 0.8rem; color: var(--text-sec); }
.brand-icon { width: 36px; height: 36px; display: block; }
.header-actions { display: flex; gap: 8px; align-items: center; }

/* -- Buttons ------------------------------------------------------- */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border);
  background: #ffffff; color: var(--text); font-size: 0.82rem; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.btn:hover { background: var(--bg-hover); border-color: var(--accent); }
.btn-sm { padding: 4px 10px; font-size: 0.75rem; }
.btn-primary { background: var(--success); color: #fff; border-color: var(--success); }
.btn-primary:hover { background: #16a34a; border-color: #16a34a; }
.fetch-status { font-size: 0.72rem; color: var(--text-sec); }
.source-badge {
  display: inline-block; padding: 1px 6px; border-radius: 4px;
  font-size: 0.6rem; font-weight: 600; text-transform: uppercase; margin-left: 6px;
}
.source-live { background: var(--success-dim); color: var(--success); }
.source-cache { background: var(--warning-dim); color: var(--warning); }
.source-file { background: #1e293b; color: var(--text-muted); border: 1px solid var(--border); }
.auto-refresh-label { font-size: 0.65rem; color: var(--text-muted); }

/* -- Main layout --------------------------------------------------- */
.main { max-width: 1400px; margin: 0 auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 24px; }
.main.loading-state {
  min-height: calc(100vh - 170px);
}

/* -- Table cards --------------------------------------------------- */
.table-grid { display: flex; flex-direction: column; gap: 14px; }
.table-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  box-shadow: var(--shadow); transition: border-color 0.2s;
  display: flex; flex-direction: column; gap: 10px;
  cursor: pointer; position: relative; overflow: hidden;
}
.table-card:hover { border-color: var(--accent); }
.table-card::before {
  content: ''; position: absolute; left: 0; top: 0; right: 0; height: 3px;
  background: #a9cfc5;
}
.table-card.status-ok {
  border-color: var(--border);
  background: var(--bg-card);
}
.table-card.status-ok::before { background: #a9cfc5; }
.table-card.status-warn {
  border-color: var(--border);
  background: var(--bg-card);
}
.table-card.status-warn::before { background: #a9cfc5; }
.table-card.status-err {
  border-color: var(--border);
  background: var(--bg-card);
}
.table-card.status-err::before { background: #a9cfc5; }
.table-card.status-nc {
  border-color: var(--border);
  background: var(--bg-card);
}
.table-card.status-nc::before { background: #a9cfc5; }
.table-card-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.table-card-header h2 { font-size: 1.15rem; font-weight: 700; }
.table-card-header .location { font-size: 0.78rem; color: var(--text-sec); }
.table-card-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.status-time { font-size: 0.78rem; color: var(--text-sec); }
.next-check { font-weight: 600; }
.next-check-good { color: var(--success); }
.next-check-warn { color: var(--warning); }
.next-check-late { color: var(--danger); }
.next-check-unknown { color: var(--text-muted); }
.station-metrics { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
.table-badge {
  display: inline-block; padding: 3px 10px; border-radius: 12px;
  font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
}
.badge-ok { background: var(--success-dim); color: var(--success); }
.badge-warn { background: var(--warning-dim); color: var(--warning); }
.badge-err { background: var(--danger-dim); color: var(--danger); }
.badge-nc { background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); }

/* -- Metrics grid -------------------------------------------------- */
.metrics-grid { display: contents; }
.metric-box { background: var(--bg); border-radius: 8px; padding: 8px 10px; text-align: left; min-width: 145px; }
.metric-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
.metric-value { font-size: 1rem; font-weight: 700; margin-top: 1px; }
.metric-sub { font-size: 0.65rem; color: var(--text-muted); }
.metric-value.bat-green { color: var(--success); }
.metric-value.bat-yellow { color: var(--warning); }
.metric-value.bat-red { color: var(--danger); }
.station-metrics .metric-box { border-top: 2px solid #d5e8e2; }
.metric-group {
  background: var(--bg); border-radius: 8px; padding: 6px 8px;
  min-width: 260px; border-top: 2px solid #d5e8e2;
  display: flex; flex-direction: column; gap: 6px;
}
.metric-group-title {
  font-size: 0.62rem; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.06em; font-weight: 700;
}
.metric-group-row { display: flex; gap: 8px; }
.metric-group .metric-box {
  border-top: none; min-width: 110px; flex: 1;
  background: #f7fcfa; padding: 7px 8px;
}

/* -- Node health row ----------------------------------------------- */
.node-row { display: flex; gap: 10px; flex-wrap: wrap; }
.node-chip {
  flex: 1; min-width: 100px; background: var(--bg); border-radius: 8px; padding: 6px 10px;
  display: flex; align-items: center; gap: 6px;
}
.node-chip .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-green { background: var(--success); }
.dot-yellow { background: var(--warning); }
.dot-red { background: var(--danger); }
.dot-grey { background: var(--text-muted); }
.node-chip .node-name { font-size: 0.72rem; font-weight: 600; }
.node-chip .node-bat { font-size: 0.72rem; color: var(--text-sec); margin-left: auto; }
.node-chip .node-fw { font-size: 0.6rem; color: var(--text-muted); margin-left: 6px; opacity: 0.8; }

/* -- Mini spark chart ---------------------------------------------- */
.spark-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.spark-range-btns { display: flex; gap: 3px; }
.spark-range-btn {
  font-size: 0.6rem; padding: 2px 7px; border: 1px solid var(--border);
  background: transparent; color: var(--text-muted); border-radius: 4px;
  cursor: pointer; line-height: 1.6;
}
.spark-range-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.spark-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.spark-box { background: var(--bg); border-radius: 8px; padding: 8px; min-width: 0; overflow: hidden; }
.spark-title { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
.spark-wrap { height: 60px; position: relative; }

/* -- Weather summary (no-data cards) ------------------------------- */
.weather-summary { display: flex; flex-direction: column; gap: 10px; }
.weather-summary .wx-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.weather-summary .wx-current { display: flex; align-items: center; gap: 12px; padding: 8px 12px; background: var(--bg); border-radius: 8px; }
.weather-summary .wx-icon { font-size: 2rem; line-height: 1; }
.weather-summary .wx-temp { font-size: 1.4rem; font-weight: 700; }
.weather-summary .wx-desc { font-size: 0.75rem; color: var(--text-sec); }
.weather-summary .wx-detail { font-size: 0.72rem; color: var(--text-muted); }
.wx-forecast-row { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0; }
.wx-forecast-day { flex: 0 0 auto; background: var(--bg); border-radius: 8px; padding: 8px 10px; text-align: center; min-width: 70px; }
.wx-forecast-day .wx-f-day { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
.wx-forecast-day .wx-f-icon { font-size: 1.2rem; margin: 2px 0; }
.wx-forecast-day .wx-f-temp { font-size: 0.78rem; font-weight: 600; }
.wx-forecast-day .wx-f-lo { font-size: 0.68rem; color: var(--text-muted); }

/* -- Loading ------------------------------------------------------- */
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  vertical-align: middle; margin-right: 4px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 0.8rem; color: var(--text-muted); padding: 16px; text-align: center; }
.loading-panel {
  background: #f2f7f4;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  min-height: 320px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* -- Footer -------------------------------------------------------- */
.footer { text-align: center; padding: 20px; font-size: 0.75rem; color: var(--text-muted); }

/* -- Responsive ---------------------------------------------------- */
@media (max-width: 768px) {
  .header { padding: 12px 16px; }
  .main { padding: 12px; gap: 12px; }
  .metric-box { min-width: 130px; }
}
</style>
</head>

<script>
// =====================================================================
// TABLE DEFINITIONS
// =====================================================================

// Read per-channel config from settings (channels array in localStorage)
function getChannelConfig(tableId) {
  try {
    var s = JSON.parse(localStorage.getItem('seaweed_dashboard_config'));
    if (s && s.channels && s.channels.length) {
      var ch = s.channels.find(function(c) { return c.id === tableId; });
      if (ch) return ch;
    }
    if (s && s.deviceProfiles && s.deviceProfiles.length) {
      var p = s.deviceProfiles.find(function(dp) { return dp.id === tableId; });
      if (p) {
        return {
          channelId: p.channelId || '',
          apiKey: p.apiKey || '',
          dataFolder: p.dataFolder || ''
        };
      }
    }
    // Legacy fallback: single channelId → perth only
    if (s && s.channelId && tableId === 'perth') {
      return { channelId: s.channelId, apiKey: s.apiKey || '' };
    }
  } catch (e) {}
  return null;
}

var TABLES_DEFAULT = [
  {
    id: 'shangani',
    name: 'Shangani',
    location: 'Kwale County, Kenya',
    page: 'pages/station.html?table=shangani',
    dataFile: 'data/data_Shangani/merged_data.js',
    weather: { lat: -4.55, lon: 39.50 },
    channelId: '',
    apiKey: '',
    hasSatellite: true,
  },
  {
    id: 'funzi',
    name: 'Funzi',
    location: 'Funzi Island, Kenya',
    page: 'pages/station.html?table=funzi',
    dataFile: 'data/data_Funzi/merged_data.js',
    weather: { lat: -4.55, lon: 39.45 },
    channelId: '',
    apiKey: '',
    hasSatellite: true,
  },
  {
    id: 'spare',
    name: 'Spare',
    location: 'Spare Station',
    page: 'pages/station.html?table=spare',
    dataFile: 'data/data_spare/merged_data.js',
    weather: { lat: 0, lon: 0 },
    channelId: '',
    apiKey: '',
    hasSatellite: true,
  },
  {
    id: 'perth',
    name: 'Perth Test',
    location: 'Noranda, WA',
    page: 'pages/station.html?table=perth',
    dataFile: 'data/data_3262071_TT/merged_data.js',
    weather: { lat: -31.87, lon: 115.90 },
    channelId: '3262071',
    apiKey: 'VVHUX39KINYPLCVI',
    hasSatellite: true,
  },
  {
    id: 'wroom',
    name: 'Perth WROOM',
    location: 'Noranda, WA (WROOM-32E)',
    page: 'pages/perth_wroom.html',
    dataFile: 'data/data_WROOM_PTT/merged_data.js',
    weather: { lat: -31.87, lon: 115.90 },
    channelId: '3246116',
    apiKey: '7K00B1Y8DNOTEIM0',
    temp: true,
    legacy: true, /* WROOM: ThingSpeak legacy, retiring soon */
    hasSatellite: false,
  },
];

function buildConfiguredTables() {
  var baseMap = {};
  TABLES_DEFAULT.forEach(function(t) {
    baseMap[t.id] = Object.assign({}, t);
  });

  var configured = [];
  if (typeof getConfiguredDeviceProfiles === 'function') {
    configured = getConfiguredDeviceProfiles({ includeDisabled: false });
  }

  var tables;
  if (configured && configured.length) {
    tables = configured.map(function(p) {
      var base = baseMap[p.id] || {
        id: p.id,
        name: p.name || p.id,
        location: 'Configured station',
        page: 'pages/station.html?table=' + encodeURIComponent(p.id),
        dataFile: 'data/' + (p.dataFolder || ('data_' + p.id)) + '/merged_data.js',
        weather: { lat: 0, lon: 0 },
        channelId: '',
        apiKey: '',
        hasSatellite: true
      };
      var out = Object.assign({}, base);
      if (p.name) out.name = p.name;
      if (p.channelId != null) out.channelId = p.channelId;
      if (p.apiKey != null) out.apiKey = p.apiKey;
      if (p.dataFolder) out.dataFile = 'data/' + p.dataFolder + '/merged_data.js';
      if (!out.page || out.page.indexOf('perth_wroom.html') === -1) {
        out.page = p.id === 'wroom' ? 'pages/perth_wroom.html' : ('pages/station.html?table=' + encodeURIComponent(p.id));
      }
      if (typeof p.hasSatellite === 'boolean') out.hasSatellite = p.hasSatellite;
      return out;
    });
  } else {
    tables = TABLES_DEFAULT.map(function(t) { return Object.assign({}, t); });
  }

  tables.forEach(function(t) {
    var ch = getChannelConfig(t.id);
    if (ch) {
      if (ch.channelId) t.channelId = ch.channelId;
      if (ch.apiKey)    t.apiKey    = ch.apiKey;
      if (ch.dataFolder) t.dataFile = 'data/' + ch.dataFolder + '/merged_data.js';
    }
  });

  return tables;
}

var TABLES = buildConfiguredTables();

// Role-based station filtering
if (typeof filterStationsForRole === 'function') {
  TABLES = filterStationsForRole(TABLES);
}
if (typeof applyNavVisibility === 'function') applyNavVisibility();

if (!TABLES.length) {
  TABLES = TABLES_DEFAULT.map(function(t) {
    var c = Object.assign({}, t);
    var ch = getChannelConfig(c.id);
    if (ch) {
      if (ch.channelId) c.channelId = ch.channelId;
      if (ch.apiKey) c.apiKey = ch.apiKey;
      if (ch.dataFolder) c.dataFile = 'data/' + ch.dataFolder + '/merged_data.js';
    }
    return c;
  });
}

TABLES.forEach(function(t) {
  if (!t.page) {
    t.page = t.id === 'wroom' ? 'pages/perth_wroom.html' : ('pages/station.html?table=' + encodeURIComponent(t.id));
  }
});

// =====================================================================
// UTILITY: Parse feed entry into usable values
// =====================================================================
function parseEntry(f) {
  // Already-parsed entry object from cache
  if (f && f.timestamp !== undefined && f.t0BatPct !== undefined) {
    var parsedTs = f.timestamp instanceof Date ? f.timestamp : new Date(f.timestamp);
    if (isNaN(parsedTs.getTime()) && f.created_at) parsedTs = new Date(f.created_at);
    var out = Object.assign({}, f);
    out.timestamp = parsedTs;
    return out;
  }

  // Structured feed object (named properties)
  if (f && f.field1 === undefined && (f.battery_pct !== undefined || f.recorded_at !== undefined)) {
    var st = new Date(f.created_at || f.recorded_at);
    return {
      timestamp: st,
      t0BatPct: numParse(f.battery_pct),
      t0BatV: numParse(f.battery_v),
      t0Temp1: numParse(f.temp_1), t0Temp2: numParse(f.temp_2), t0Temp3: null,
      t0Hum1: numParse(f.humidity_1), t0Hum2: numParse(f.humidity_2), t0Hum3: null,
      satABatPct: numParse(f.sat_a_battery_pct), satABatV: numParse(f.sat_a_battery_v),
      satATemp1: numParse(f.sat_a_temp_1), satATemp2: numParse(f.sat_a_temp_2),
      satAHum1: numParse(f.sat_a_humidity_1), satAHum2: numParse(f.sat_a_humidity_2),
      satBBatPct: numParse(f.sat_b_battery_pct), satBBatV: numParse(f.sat_b_battery_v),
      satBTemp1: numParse(f.sat_b_temp_1), satBTemp2: numParse(f.sat_b_temp_2),
      satBHum1: numParse(f.sat_b_humidity_1), satBHum2: numParse(f.sat_b_humidity_2),
      t0FwVersion: f.fw_version ? String(f.fw_version) : null,
      t0BuildDate: f.fw_date ? String(f.fw_date) : null,
      satAFwVersion: f.sat_a_fw_ver ? String(f.sat_a_fw_ver) : null,
      satBFwVersion: f.sat_b_fw_ver ? String(f.sat_b_fw_ver) : null,
    };
  }

  var ts = new Date(f.created_at);
  var t0Sensors = csvParse(f.field2);
  var t0Status  = csvParse(f.field3);
  var satAStat  = csvParse(f.field4);
  var satASens  = csvParse(f.field5);
  var satBStat  = csvParse(f.field6);
  var satBSens  = csvParse(f.field7);

  // Extract firmware versions (string values, not numeric)
  var satAFw = null, satBFw = null, t0Fw = null, t0BuildDate = null;
  if (f.field4) {
    var parts4 = f.field4.split(',');
    if (parts4.length > 6 && parts4[6]) satAFw = parts4[6].trim();
  }
  if (f.field6) {
    var parts6 = f.field6.split(',');
    if (parts6.length > 6 && parts6[6]) satBFw = parts6[6].trim();
  }
  if (f.field8) {
    var sections = f.field8.split('|');
    if (sections.length > 2) {
      var fwParts = sections[2].split(',');
      t0Fw = fwParts[0] ? fwParts[0].trim() : null;
      t0BuildDate = fwParts[1] ? fwParts[1].trim() : null;
    }
  }

  return {
    timestamp: ts,
    t0BatPct: parseFloat(f.field1) || null,
    t0BatV: t0Status[0] || null,
    t0Temp1: t0Sensors[0], t0Temp2: t0Sensors[2], t0Temp3: t0Sensors[4],
    t0Hum1: t0Sensors[1], t0Hum2: t0Sensors[3], t0Hum3: t0Sensors[5],
    satABatPct: satAStat[1], satABatV: satAStat[0],
    satATemp1: satASens[0], satATemp2: satASens[2],
    satBBatPct: satBStat[1], satBBatV: satBStat[0],
    satBTemp1: satBSens[0], satBTemp2: satBSens[2],
    t0FwVersion: t0Fw,
    t0BuildDate: t0BuildDate,
    satAFwVersion: satAFw,
    satBFwVersion: satBFw,
  };
}

function findLast(entries, key) {
  for (var i = entries.length - 1; i >= 0; i--) {
    if (entries[i][key] != null) return entries[i];
  }
  return null;
}

function formatDatasetUpdate(ts) {
  if (!ts) return { value: '--', sub: 'No dataset timestamp', hoursSince: null };
  var d = ts instanceof Date ? ts : new Date(ts);
  if (isNaN(d.getTime())) return { value: '--', sub: 'Invalid timestamp', hoursSince: null };

  var abs = d.toLocaleString('en-GB', {
    year: 'numeric', month: 'short', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false
  });

  var mins = Math.max(0, Math.round((Date.now() - d.getTime()) / 60000));
  var hoursSince = mins / 60;
  var rel;
  if (mins < 1) rel = 'just now';
  else if (mins < 60) rel = mins + 'm ago';
  else {
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) rel = hrs + 'h ago';
    else rel = Math.floor(hrs / 24) + 'd ago';
  }

  return { value: abs, sub: rel, hoursSince: hoursSince };
}

function formatStatusTime(updateInfo) {
  if (!updateInfo || !updateInfo.value) return '--';
  if (updateInfo.hoursSince == null || !isFinite(updateInfo.hoursSince)) return updateInfo.value;
  return updateInfo.value + ' (' + updateInfo.hoursSince.toFixed(1) + 'h)';
}

function formatEtaMinutes(mins) {
  var abs = Math.max(0, Math.round(Math.abs(mins)));
  if (abs < 60) return abs + 'm';
  var h = Math.floor(abs / 60);
  var m = abs % 60;
  return m ? (h + 'h ' + m + 'm') : (h + 'h');
}

var NEXT_CHECK_PIPELINE_BUFFER_MIN = 12;

function formatNextCheckIn(tableId, lastUpdate, dataHealth) {
  var statusRow = _deviceStatusById && _deviceStatusById[tableId] ? _deviceStatusById[tableId] : null;
  var nextFromStatus = statusRow && statusRow.nextCheckInAt ? statusRow.nextCheckInAt : null;
  if (nextFromStatus && !isNaN(nextFromStatus.getTime())) {
    var authDeltaMin = Math.round((nextFromStatus.getTime() - Date.now()) / 60000);
    var authState = 'good';
    var authWhen;
    if (authDeltaMin >= 0) {
      authState = 'good';
      authWhen = 'in ' + formatEtaMinutes(authDeltaMin);
    } else if (Math.abs(authDeltaMin) <= NEXT_CHECK_PIPELINE_BUFFER_MIN) {
      authState = 'warn';
      authWhen = 'pending ingest';
    } else {
      authState = 'late';
      authWhen = 'overdue by ' + formatEtaMinutes(Math.abs(authDeltaMin) - NEXT_CHECK_PIPELINE_BUFFER_MIN);
    }
    var authAbs = nextFromStatus.toLocaleString('en-GB', {
      hour: '2-digit', minute: '2-digit', hour12: false,
      timeZone: 'UTC'
    });
    var authCls = authState === 'good' ? 'next-check-good' : (authState === 'warn' ? 'next-check-warn' : 'next-check-late');
    var authText = 'Next check in: ' + authWhen + ' (' + authAbs + ' UTC)';
    return { html: '<span class="next-check ' + authCls + '">' + authText + '</span>', text: authText };
  }

  if (!lastUpdate || !dataHealth || !dataHealth.expected) {
    return { html: '<span class="next-check next-check-unknown">Next check in: --</span>', text: 'Next check in: --' };
  }
  var last = lastUpdate instanceof Date ? lastUpdate : new Date(lastUpdate);
  if (isNaN(last.getTime())) {
    return { html: '<span class="next-check next-check-unknown">Next check in: --</span>', text: 'Next check in: --' };
  }

  var cadenceMin = Math.max(1, Math.round((24 * 60) / dataHealth.expected));
  var nextAt = new Date(last.getTime() + cadenceMin * 60000);
  var deltaMin = Math.round((nextAt.getTime() - Date.now()) / 60000);
  var state = 'good';
  var when;
  if (deltaMin >= 0) {
    state = 'good';
    when = 'in ' + formatEtaMinutes(deltaMin);
  } else if (Math.abs(deltaMin) <= NEXT_CHECK_PIPELINE_BUFFER_MIN) {
    state = 'warn';
    when = 'pending ingest';
  } else {
    state = 'late';
    when = 'overdue by ' + formatEtaMinutes(Math.abs(deltaMin) - NEXT_CHECK_PIPELINE_BUFFER_MIN);
  }
  var nextAbs = nextAt.toLocaleString('en-GB', {
    hour: '2-digit', minute: '2-digit', hour12: false,
    timeZone: 'UTC'
  });
  var cls = state === 'good' ? 'next-check-good' : (state === 'warn' ? 'next-check-warn' : 'next-check-late');
  var text = 'Next check in: ' + when + ' (' + nextAbs + ' UTC)';
  return { html: '<span class="next-check ' + cls + '">' + text + '</span>', text: text };
}

// =====================================================================
// COMPUTE SUMMARY for a table
// =====================================================================
function computeDataHealth(entries, nowMs) {
  var now = nowMs || Date.now();
  var h24 = entries.filter(function(e) { return (now - e.timestamp.getTime()) < 86400000; });
  var actual = h24.length;
  if (!actual) return { actual: 0, expected: 0, pct: null };

  var diffs = [];
  for (var i = 1; i < h24.length; i++) {
    var d = (h24[i].timestamp.getTime() - h24[i - 1].timestamp.getTime()) / 60000;
    if (d > 0 && d <= 360) diffs.push(d);
  }
  diffs.sort(function(a, b) { return a - b; });
  var cadence = diffs.length ? diffs[Math.floor(diffs.length / 2)] : 15;
  if (!cadence || cadence < 1) cadence = 15;

  var expected = Math.max(1, Math.round((24 * 60) / cadence));
  var pct = Math.max(0, Math.min(100, (actual / expected) * 100));
  return { actual: actual, expected: expected, pct: pct };
}

function computeSummary(entries) {
  if (!entries || entries.length === 0) return null;

  var latest = entries[entries.length - 1];
  var now = Date.now();
  var latestMs = latest.timestamp.getTime();
  // Anchor peak windows to the latest datapoint so stale tables still show recent peaks.
  var h24 = entries.filter(function(e) {
    var ts = e.timestamp.getTime();
    return ts <= latestMs && (latestMs - ts) < 86400000;
  });
  var w7  = entries.filter(function(e) { return (now - e.timestamp.getTime()) < 7 * 86400000; });
  var m30 = entries.filter(function(e) { return (now - e.timestamp.getTime()) < 30 * 86400000; });
  var health = computeDataHealth(entries, now);

  function peak(arr, keys) {
    var max = null;
    for (var i = 0; i < arr.length; i++) {
      for (var k = 0; k < keys.length; k++) {
        var v = arr[i][keys[k]];
        if (v != null && (max === null || v > max)) max = v;
      }
    }
    return max;
  }
  function minVal(arr, keys) {
    var min = null;
    for (var i = 0; i < arr.length; i++) {
      for (var k = 0; k < keys.length; k++) {
        var v = arr[i][keys[k]];
        if (v != null && (min === null || v < min)) min = v;
      }
    }
    return min;
  }

  // Compute across any available sensor values (T0 + satellite channels).
  var tempKeys = ['t0Temp1', 't0Temp2', 't0Temp3', 'satATemp1', 'satATemp2', 'satBTemp1', 'satBTemp2'];
  var humKeys = ['t0Hum1', 't0Hum2', 't0Hum3', 'satAHum1', 'satAHum2', 'satBHum1', 'satBHum2'];

  // Freshness: online <=24h, stale 24-48h, offline >48h.
  var ageMins = (now - latest.timestamp.getTime()) / 60000;
  var freshness = ageMins <= (24 * 60) ? 'ok' : (ageMins <= (48 * 60) ? 'warn' : 'err');

  // Node health
  var lastT0  = findLast(entries, 't0BatPct');
  var lastSatA = findLast(entries, 'satABatPct');
  var lastSatB = findLast(entries, 'satBBatPct');

  function nodeHealth(lastEntry, batKey, fwKey) {
    if (!lastEntry) return { status: 'nc', bat: null, lastSeen: null, fw: null };
    var bat = lastEntry[batKey];
    var status = 'yellow';
    if (bat !== null) {
      if (bat > 80) status = 'green';
      else if (bat < 30) status = 'red';
      else status = 'yellow';
    }
    return { status: status, bat: bat, lastSeen: lastEntry.timestamp, fw: lastEntry[fwKey] || null };
  }

  return {
    freshness: freshness,
    lastUpdate: latest.timestamp,
    entries: entries.length,
    t0: nodeHealth(lastT0, 't0BatPct', 't0FwVersion'),
    satA: nodeHealth(lastSatA, 'satABatPct', 'satAFwVersion'),
    satB: nodeHealth(lastSatB, 'satBBatPct', 'satBFwVersion'),
    dataHealth: health,
    dayTempHigh:  peak(h24, tempKeys),
    dayTempLow:   minVal(h24, tempKeys),
    dayHumHigh:   peak(h24, humKeys),
    weekTempHigh: peak(w7, tempKeys),
    weekHumHigh:  peak(w7, humKeys),
    monthTempHigh: peak(m30, tempKeys),
    monthHumHigh:  peak(m30, humKeys),
    // Last 24h of temp data for sparkline
    sparkTemp: h24.map(function(e) {
      for (var i = 0; i < tempKeys.length; i++) {
        var v = e[tempKeys[i]];
        if (v != null) return { x: e.timestamp.getTime(), y: v };
      }
      return null;
    }).filter(function(p) { return p && p.y != null; }),
    sparkHum:  h24.map(function(e) {
      for (var i = 0; i < humKeys.length; i++) {
        var v = e[humKeys[i]];
        if (v != null) return { x: e.timestamp.getTime(), y: v };
      }
      return null;
    }).filter(function(p) { return p && p.y != null; }),
  };
}

// =====================================================================
// RENDER TABLE CARD
// =====================================================================
// =====================================================================
// WROOM DUAL-CHANNEL PARSER (temp + hum from separate ThingSpeak channels)
// =====================================================================
function parseWroomDualChannel(tempFeeds, humFeeds) {
  var entries = {};
  function roundMin(ts) { return Math.round(ts.getTime() / 60000); }
  function numParse(v) {
    if (v === null || v === undefined || v === '' || v === 'null') return null;
    var n = parseFloat(v);
    return isNaN(n) ? null : n;
  }
  if (tempFeeds && tempFeeds.length) {
    tempFeeds.forEach(function(f) {
      var ts = new Date(f.created_at);
      if (isNaN(ts.getTime())) return;
      var key = roundMin(ts);
      if (!entries[key]) entries[key] = { timestamp: ts };
      var e = entries[key];
      for (var s = 1; s <= 5; s++) {
        var val = numParse(f['field' + s]);
        e['t' + s] = val;
        if (e['ok' + s] === undefined) e['ok' + s] = (val !== null && val !== 0) ? 1 : 0;
      }
    });
  }
  if (humFeeds && humFeeds.length) {
    humFeeds.forEach(function(f) {
      var ts = new Date(f.created_at);
      if (isNaN(ts.getTime())) return;
      var key = roundMin(ts);
      if (!entries[key]) entries[key] = { timestamp: ts };
      var e = entries[key];
      for (var s = 1; s <= 5; s++) {
        var val = numParse(f['field' + s]);
        e['rh' + s] = val;
        if (val !== null && val !== 0) e['ok' + s] = 1;
      }
    });
  }
  return Object.values(entries).map(function(e) {
    for (var s = 1; s <= 5; s++) {
      if (e['t' + s]  === undefined) e['t' + s]  = null;
      if (e['rh' + s] === undefined) e['rh' + s] = null;
      if (e['ok' + s] === undefined) e['ok' + s] = 0;
    }
    return e;
  }).filter(function(e) { return !isNaN(e.timestamp.getTime()); })
    .sort(function(a, b) { return a.timestamp - b.timestamp; });
}

// =====================================================================
// WROOM-SPECIFIC SUMMARY + CARD
// =====================================================================
function computeWroomSummary(entries) {
  if (!entries || entries.length === 0) return null;
  var latest = entries[entries.length - 1];
  var now = Date.now();
  var h24 = entries.filter(function(e) { return (now - e.timestamp.getTime()) < 86400000; });
  var w7  = entries.filter(function(e) { return (now - e.timestamp.getTime()) < 7 * 86400000; });
  var health = computeDataHealth(entries, now);

  function peak(arr, keys) {
    var max = null;
    for (var i = 0; i < arr.length; i++) {
      for (var k = 0; k < keys.length; k++) {
        var v = arr[i][keys[k]];
        if (v != null && (max === null || v > max)) max = v;
      }
    }
    return max;
  }
  function minVal(arr, keys) {
    var min = null;
    for (var i = 0; i < arr.length; i++) {
      for (var k = 0; k < keys.length; k++) {
        var v = arr[i][keys[k]];
        if (v != null && (min === null || v < min)) min = v;
      }
    }
    return min;
  }
  function avg(arr, keys) {
    var sum = 0, n = 0;
    for (var i = 0; i < arr.length; i++) {
      for (var k = 0; k < keys.length; k++) {
        var v = arr[i][keys[k]];
        if (v != null) { sum += v; n++; }
      }
    }
    return n ? sum / n : null;
  }

  var tKeys = ['t1','t2','t3','t4','t5'];
  var hKeys = ['rh1','rh2','rh3','rh4','rh5'];

  var ageMins = (now - latest.timestamp.getTime()) / 60000;
  var freshness = ageMins <= (24 * 60) ? 'ok' : (ageMins <= (48 * 60) ? 'warn' : 'err');

  // Count active sensors from latest
  var activeSensors = 0;
  for (var s = 1; s <= 5; s++) {
    if (latest['t' + s] != null || latest['rh' + s] != null) activeSensors++;
  }

  // Sparkline from first available sensor
  var sparkKey = 't1';
  var sparkHumKey = 'rh1';
  for (var sk = 1; sk <= 5; sk++) {
    if (latest['t' + sk] != null) { sparkKey = 't' + sk; sparkHumKey = 'rh' + sk; break; }
  }
  var sparkTemp = h24.map(function(e) { return { x: e.timestamp.getTime(), y: e[sparkKey] }; }).filter(function(p) { return p.y != null; });
  var sparkHum  = h24.map(function(e) { return { x: e.timestamp.getTime(), y: e[sparkHumKey] }; }).filter(function(p) { return p.y != null; });

  return {
    freshness: freshness,
    lastUpdate: latest.timestamp,
    entries: entries.length,
    activeSensors: activeSensors,
    dataHealth: health,
    dayTempHigh:  peak(h24, tKeys),
    dayTempLow:   minVal(h24, tKeys),
    dayTempAvg:   avg(h24, tKeys),
    dayHumHigh:   peak(h24, hKeys),
    dayHumAvg:    avg(h24, hKeys),
    weekTempHigh: peak(w7, tKeys),
    weekHumHigh:  peak(w7, hKeys),
    sparkTemp: sparkTemp,
    sparkHum: sparkHum,
  };
}

function renderWroomCard(table, summary) {
  var card = document.createElement('div');
  card.className = 'table-card';
  card.onclick = function() { window.location.href = table.page; };

  if (!summary) {
    card.innerHTML =
      '<div class="table-card-header">' +
        '<div><h2>' + table.name + '</h2><div class="location">' + table.location + '</div></div>' +
        '<span class="table-badge badge-nc">No Data</span>' +
      '</div>' +
      '<div class="loading-text">No cached data. Open the <a href="' + table.page + '">WROOM page</a> and fetch data first.</div>';
    return card;
  }

  var badgeClass = summary.freshness === 'ok' ? 'badge-ok' : (summary.freshness === 'warn' ? 'badge-warn' : 'badge-err');
  var badgeText  = summary.freshness === 'ok' ? 'Online' : (summary.freshness === 'warn' ? 'Stale' : 'Offline');
  card.className = 'table-card status-' + summary.freshness;
  var fmt = function(v, unit, dp) {
    if (v === null || v === undefined) return '--';
    return v.toFixed(dp !== undefined ? dp : 1) + (unit || '');
  };

  var healthValue = summary.dataHealth && summary.dataHealth.pct != null ? summary.dataHealth.pct.toFixed(0) + '%' : '--';
  var healthSub = summary.dataHealth && summary.dataHealth.pct != null ?
    (summary.dataHealth.actual + '/' + summary.dataHealth.expected + ' samples (24h)') :
    'No samples in last 24h';
  var updateInfo = formatDatasetUpdate(summary.lastUpdate);
  var nextCheck = formatNextCheckIn(table.id, summary.lastUpdate, summary.dataHealth);

  card.innerHTML =
    '<div class="table-card-header">' +
      '<div><h2>' + table.name + '</h2><div class="location">' + table.location + '</div></div>' +
      '<div class="table-card-right">' +
        '<span class="table-badge ' + badgeClass + '">' + badgeText + '</span>' +
        '<span class="status-time">' + formatStatusTime(updateInfo) + ' | ' + nextCheck.html + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="station-metrics">' +
      metricBox('T0 Batt', '--', 'Not available on WROOM') +
      metricBox('Data Health', healthValue, healthSub) +
      metricGroup('Peak 24h',
        metricBox('Temp', fmt(summary.dayTempHigh, '\u00B0C')) +
        metricBox('Humidity', fmt(summary.dayHumHigh, '%'))
      ) +
      metricGroup('Peak 7 Days',
        metricBox('Temp', fmt(summary.weekTempHigh, '\u00B0C')) +
        metricBox('Humidity', fmt(summary.weekHumHigh, '%'))
      ) +
    '</div>';

  return card;
}

async function fetchWeatherCard(table) {
  if (!table.weather) return null;
  try {
    var url = 'https://api.open-meteo.com/v1/forecast?latitude=' + table.weather.lat +
      '&longitude=' + table.weather.lon +
      '&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,precipitation' +
      '&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_sum' +

// =====================================================================
function renderTableCard(table, summary) {
  var card = document.createElement('div');
  card.className = 'table-card';
  card.onclick = function() { window.location.href = table.page; };

  var noData = !summary;
  if (noData) {
    summary = {
      freshness: 'nc', lastUpdate: null, entries: 0,
      t0:   { status: 'nc', bat: null, lastSeen: null, fw: null },
      satA: { status: 'nc', bat: null, lastSeen: null, fw: null },
      satB: { status: 'nc', bat: null, lastSeen: null, fw: null },
      dataHealth: { actual: 0, expected: 0, pct: null },
      dayTempHigh: null, dayTempLow: null, dayHumHigh: null,
      weekTempHigh: null, weekHumHigh: null,
      monthTempHigh: null, monthHumHigh: null,
      sparkTemp: [], sparkHum: [],
    };
  }

  var badgeClass, badgeText;
  if (noData) { badgeClass = 'badge-nc'; badgeText = 'No Data'; }
  else {
    badgeClass = summary.freshness === 'ok' ? 'badge-ok' : (summary.freshness === 'warn' ? 'badge-warn' : 'badge-err');
    badgeText  = summary.freshness === 'ok' ? 'Online' : (summary.freshness === 'warn' ? 'Stale' : 'Offline');
  }
  card.className = 'table-card status-' + (noData ? 'nc' : summary.freshness);

  var fmt = function(v, unit, dp) {
    if (v === null || v === undefined) return '--';
    return v.toFixed(dp !== undefined ? dp : 1) + (unit || '');
  };
  var batteryToneClass = function(pct) {
    if (pct === null || pct === undefined || isNaN(pct)) return '';
    if (pct > 80) return 'bat-green';
    if (pct < 30) return 'bat-red';
    return 'bat-yellow';
  };
  var satLabel = '--';
  var satPctForTone = null;
  var satAVal = summary.satA && summary.satA.bat != null ? Math.round(summary.satA.bat) + '%' : null;
  var satBVal = summary.satB && summary.satB.bat != null ? Math.round(summary.satB.bat) + '%' : null;
  var satAValNum = summary.satA && summary.satA.bat != null ? Number(summary.satA.bat) : null;
  var satBValNum = summary.satB && summary.satB.bat != null ? Number(summary.satB.bat) : null;
  if (satAVal && satBVal) satLabel = 'A ' + satAVal + ' / B ' + satBVal;
  else if (satAVal) satLabel = satAVal;
  else if (satBVal) satLabel = satBVal;
  if (satAValNum !== null && satBValNum !== null) satPctForTone = Math.min(satAValNum, satBValNum);
  else if (satAValNum !== null) satPctForTone = satAValNum;
  else if (satBValNum !== null) satPctForTone = satBValNum;

  // Prefer latest sample battery; fallback to device_status when sample is missing.
  var statusRow = _deviceStatusById && _deviceStatusById[table.id] ? _deviceStatusById[table.id] : null;
  var t0LatestSamplePct = summary.t0 && summary.t0.bat != null ? Number(summary.t0.bat) : null;
  var t0DisplayPct = t0LatestSamplePct;
  if (t0DisplayPct === null && statusRow && statusRow.batteryPct != null && isFinite(statusRow.batteryPct)) {
    if (statusRow.batteryPct >= 0) t0DisplayPct = Number(statusRow.batteryPct);
    else t0DisplayPct = null; // -1 sentinel means unknown in device_status
  }
  var t0PluggedIn = (t0LatestSamplePct === 0);
  var t0BattSub = t0PluggedIn ? 'Plugged in (USB sample)' : '';

  var healthValue = summary.dataHealth && summary.dataHealth.pct != null ? summary.dataHealth.pct.toFixed(0) + '%' : '--';
  var healthSub = summary.dataHealth && summary.dataHealth.pct != null ?
    (summary.dataHealth.actual + '/' + summary.dataHealth.expected + ' samples (24h)') :
    'No samples in last 24h';
  var updateInfo = formatDatasetUpdate(summary.lastUpdate);
  var nextCheck = formatNextCheckIn(table.id, summary.lastUpdate, summary.dataHealth);

  var metrics =
    metricBox('T0 Batt', t0DisplayPct != null ? Math.round(t0DisplayPct) + '%': '--', t0BattSub, batteryToneClass(t0DisplayPct)) +
    (table.hasSatellite ? metricBox('Satellite Batt', satLabel, '', batteryToneClass(satPctForTone)) : '') +
    metricBox('Data Health', healthValue, healthSub) +
    metricGroup('Peak 24h',
      metricBox('Temp', fmt(summary.dayTempHigh, '\u00B0C')) +
      metricBox('Humidity', fmt(summary.dayHumHigh, '%'))
    ) +
    metricGroup('Peak 7 Days',
      metricBox('Temp', fmt(summary.weekTempHigh, '\u00B0C')) +
      metricBox('Humidity', fmt(summary.weekHumHigh, '%'))
    );

  card.innerHTML =
    '<div class="table-card-header">' +
      '<div><h2>' + table.name + '</h2><div class="location">' + table.location + '</div></div>' +
      '<div class="table-card-right">' +
        '<span class="table-badge ' + badgeClass + '">' + badgeText + '</span>' +
        '<span class="status-time">' + formatStatusTime(updateInfo) + ' | ' + nextCheck.html + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="station-metrics">' + metrics + '</div>';

  return card;
}

function renderNodeChip(name, node) {
  if (!node || node.status === 'nc') {
    return '<div class="node-chip"><span class="dot dot-grey"></span><span class="node-name">' + name + '</span><span class="node-bat">--</span></div>';
  }
  var dotClass = 'dot-' + node.status;
  var batStr = node.bat !== null ? Math.round(node.bat) + '%' : '--';
  var fwStr = node.fw ? '<span class="node-fw" title="Firmware version">v' + node.fw + '</span>' : '';
  return '<div class="node-chip"><span class="dot ' + dotClass + '"></span><span class="node-name">' + name + '</span><span class="node-bat">' + batStr + '</span>' + fwStr + '</div>';
}

function metricBox(label, value, sub, valueClass) {
  return '<div class="metric-box"><div class="metric-label">' + label + '</div><div class="metric-value ' + (valueClass || '') + '">' + value + '</div>' +
    (sub ? '<div class="metric-sub">' + sub + '</div>' : '') + '</div>';
}

function metricGroup(title, contentHtml) {
  return '<div class="metric-group">' +
    '<div class="metric-group-title">' + title + '</div>' +
    '<div class="metric-group-row">' + contentHtml + '</div>' +
    '</div>';
}

// =====================================================================
// SPARKLINE RANGE CONTROLS
// =====================================================================
var tableEntries = {};  // tableId -> entries[]
var SPARK_RANGE_MS = { 'Day': 86400000, 'Week': 7*86400000, 'Month': 30*86400000, 'All': 0 };

function rebuildSparklines(tableId, rangeMs) {
  var entries = tableEntries[tableId];
  if (!entries || !entries.length) return;
  var now = Date.now();
  var filtered = rangeMs === 0 ? entries : entries.filter(function(e) {
    return (now - e.timestamp.getTime()) < rangeMs;
  });

  var tempKey, humKey;
  if (tableId === 'wroom') {
    // WROOM uses t1..t5, rh1..rh5
    tempKey = 't1'; humKey = 'rh1';
    var latest = entries[entries.length - 1];
    for (var s = 1; s <= 5; s++) {
      if (latest['t' + s] != null) { tempKey = 't' + s; humKey = 'rh' + s; break; }
    }
  } else {
    tempKey = findLast(entries, 'satATemp1') ? 'satATemp1' : 't0Temp1';
    humKey  = findLast(entries, 'satAHum1')  ? 'satAHum1'  : 't0Hum1';
  }

  var sparkTemp = filtered.map(function(e) { return { x: e.timestamp.getTime(), y: e[tempKey] }; }).filter(function(p) { return p.y != null; });
  var sparkHum  = filtered.map(function(e) { return { x: e.timestamp.getTime(), y: e[humKey] };  }).filter(function(p) { return p.y != null; });
  var c1 = Chart.getChart('spark-temp-' + tableId); if (c1) c1.destroy();
  var c2 = Chart.getChart('spark-hum-'  + tableId); if (c2) c2.destroy();
  renderSparkline('spark-temp-' + tableId, sparkTemp, '#ef4444');
  renderSparkline('spark-hum-'  + tableId, sparkHum,  '#3b82f6');
}

function setSparkRange(tableId, label, event) {
  event.stopPropagation();
  var rangeMs = SPARK_RANGE_MS[label] !== undefined ? SPARK_RANGE_MS[label] : 86400000;
  var btns = document.querySelectorAll('.spark-range-btn[data-table="' + tableId + '"]');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].dataset.range === label);
  }
  rebuildSparklines(tableId, rangeMs);
}

function renderSparkline(canvasId, data, color) {
  var el = document.getElementById(canvasId);
  if (!el || !data || data.length < 2) return;
  new Chart(el, {
    type: 'line',
    data: {
      datasets: [{
        data: data, borderColor: color, backgroundColor: color + '22',
        borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: true,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: { type: 'time', display: false },
        y: { display: false },
      },
      animation: false,
    },
  });
}

// =====================================================================
// DATA LOADING
// =====================================================================
function loadTableData(table) {
  // WROOM: load from merged_data.js on disk (dual-channel format), fallback to localStorage
  if (table.id === 'wroom') {
    return new Promise(function(resolve) {
      var settled = false;
      var hardTimeout = setTimeout(function() {
        if (!settled) {
          settled = true;
          resolveFromCache();
        }
      }, 8000);

      function done(val) {
        if (settled) return;
        settled = true;
        clearTimeout(hardTimeout);
        resolve(val);
      }

      // Try disk file first
      if (table.dataFile) {
        var script = document.createElement('script');
        script.src = table.dataFile;
        script.onload = function() {
          script.remove();
          if (window.STATION_DATA) {
            var tsData = window.STATION_DATA;
            delete window.STATION_DATA;
            var tf = tsData.tempFeeds || tsData.feeds || [];
            var hf = tsData.humFeeds || [];
            if (tf.length || hf.length) {
              var entries = parseWroomDualChannel(tf, hf);
              if (typeof filterEntryArrayByResetWindow === 'function') {
                entries = filterEntryArrayByResetWindow(table.id, entries);
              }
              if (entries.length) { done(entries); return; }
            }
          }
          resolveFromCache();
        };
        script.onerror = function() { script.remove(); resolveFromCache(); };
        document.head.appendChild(script);
      } else {
        resolveFromCache();
      }
      function resolveFromCache() {
        try {
          var raw = localStorage.getItem('seaweed_cache_wroom');
          if (raw) {
            var cached = JSON.parse(raw);
            if (cached.allEntries && cached.allEntries.length) {
              var entries = cached.allEntries.map(function(e) {
                e.timestamp = new Date(e.timestamp);
                return e;
              });
              if (typeof filterEntryArrayByResetWindow === 'function') {
                entries = filterEntryArrayByResetWindow(table.id, entries);
              }
              done(entries);
              return;
            }
          }
        } catch (e) {}
        done(null);
      }
    });
  }

  // --- Supabase-first data loading with fallbacks ---
  // Priority: 1) Supabase live fetch  2) localStorage cache  3) merged_data.js file
  return new Promise(async function(resolve) {
    var settled = false;
    var hardTimeout = setTimeout(function() {
      if (!settled) {
        settled = true;
        resolve(null);
      }
    }, 15000);

    function done(val) {
      if (settled) return;
      settled = true;
      clearTimeout(hardTimeout);
      resolve(val);
    }

    // --- 1. Try Supabase live fetch ---
    try {
      var result = await fetchStationData(table.id, { limit: 2000, timeoutMs: 20000 });
      if (result && result.feeds && result.feeds.length) {
        var entries = result.feeds.map(parseEntry).filter(function(e) { return !isNaN(e.timestamp.getTime()); });
          if (typeof filterEntryArrayByResetWindow === 'function') {
            entries = filterEntryArrayByResetWindow(table.id, entries);
          }
          if (entries.length) {
          saveStationCache(table.id, entries, { source: 'live' });
          _dataSource[table.id] = 'live';
          done(entries);
          return;
        }
      }
    } catch (e) {
      console.log('[Overview] Supabase fetch failed for ' + table.id + ': ' + e.message);
    }

    // --- 2. Try localStorage cache ---
    function resolveFromCache() {
      try {
        var raw = localStorage.getItem('seaweed_cache_' + table.id);
        if (raw) {
          var cached = JSON.parse(raw);
          var arr = cached.allEntries || cached;
          if (Array.isArray(arr) && arr.length) {
            // Cache may contain legacy feeds, structured feeds, or parsed entries.
            var entries = arr.map(parseEntry).filter(function(e) { return !isNaN(e.timestamp.getTime()); });
            if (typeof filterEntryArrayByResetWindow === 'function') {
              entries = filterEntryArrayByResetWindow(table.id, entries);
            }
            if (entries.length) {
              // Skip stale cache (>7 days) — fall through to static file
              var newestMs = entries[entries.length - 1].timestamp.getTime();
              if ((Date.now() - newestMs) > 7 * 86400000) {
                console.log('[Overview] Cache for ' + table.id + ' too stale (' +
                  Math.round((Date.now() - newestMs) / 86400000) + 'd), skipping to static file');
                return false;
              }
              _dataSource[table.id] = 'cache';
              done(entries);
              return;
            }
          }
        }
      } catch (e) {}
      return false;
    }
    if (resolveFromCache() !== false) return;

    // --- 3. Fall back to static merged_data.js file ---
    var jsUrl = table.dataFile;
    if (!jsUrl) { done(null); return; }

    var script = document.createElement('script');
    script.src = jsUrl;
    script.onload = function() {
      if (window.STATION_DATA) {
        var data = window.STATION_DATA;
        delete window.STATION_DATA;
        var entries = (data.feeds || []).map(parseEntry).filter(function(e) { return !isNaN(e.timestamp.getTime()); });
        if (typeof filterEntryArrayByResetWindow === 'function') {
          entries = filterEntryArrayByResetWindow(table.id, entries);
        }
        if (entries.length) {
          _dataSource[table.id] = 'file';
          done(entries);
        } else {
          done(null);
        }
      } else {
        done(null);
      }
      script.remove();
    };
    script.onerror = function() {
      done(null);
      script.remove();
    };
    document.head.appendChild(script);
  });
}

var _dataSource = {};  // tableId -> 'live' | 'cache' | 'file'
var _autoRefreshTimer = null;
var _deviceStatusById = {}; // tableId -> device_status row summary

async function refreshDeviceStatusMap() {
  try {
    var ids = TABLES.map(function(t) { return t.id; }).filter(function(id) { return id !== 'wroom'; });
    _deviceStatusById = await fetchDeviceStatusMap(ids);
  } catch (e) {
    console.warn('[Overview] device_status fetch failed:', e.message || e);
  }
}

async function fetchAllLive() {
  var btn = document.getElementById('btnFetchAll');
  var statusEl = document.getElementById('fetchStatus');
  btn.innerHTML = '<span class="spinner"></span> Fetching...';
  btn.disabled = true;
  statusEl.textContent = '';

  var fetched = 0, errors = [];
  try {
    if (!TABLES.length) {
      renderAllCards();
      statusEl.innerHTML = '<span style="color:var(--text-muted)">No stations enabled in Settings.</span>';
      return;
    }

    await refreshDeviceStatusMap();
    var liveTables = TABLES.filter(function(table) { return !table.legacy; });
    if (!liveTables.length) {
      renderAllCards();
      statusEl.innerHTML = '<span style="color:var(--text-muted)">No live stations to fetch.</span>';
      return;
    }
    statusEl.textContent = 'Fetching ' + liveTables.length + ' stations...';

    var tasks = liveTables.map(function(table) {
      return (async function() {
        var result = await fetchStationData(table.id, { limit: 2000, timeoutMs: 20000 });
        var entries = (result && result.feeds ? result.feeds : [])
          .map(parseEntry)
          .filter(function(e) { return !isNaN(e.timestamp.getTime()); });
        if (entries.length) {
          tableEntries[table.id] = entries;
          saveStationCache(table.id, entries, { source: 'live' });
          _dataSource[table.id] = 'live';
          return { table: table, updated: true };
        }
        return { table: table, updated: false };
      })();
    });

    var settled = await Promise.allSettled(tasks);
    for (var i = 0; i < settled.length; i++) {
      var s = settled[i];
      if (s.status === 'fulfilled') {
        if (s.value && s.value.updated) fetched++;
      } else {
        var t = liveTables[i];
        var msg = s.reason && s.reason.message ? s.reason.message : 'Unknown error';
        console.error('[Overview] Fetch failed for ' + t.name + ':', s.reason);
        errors.push(t.name + ': ' + msg);
      }
    }

    // Re-render all cards
    renderAllCards();
    if (fetched > 0) {
      var updatedIds = liveTables.map(function(t) { return t.id; });
      notifyDashboardDataRefresh(updatedIds, 'overview.fetchAllLive');
    }

    var ts = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
    if (errors.length) {
      statusEl.innerHTML = '<span style="color:var(--warning)">' + fetched + ' OK, ' + errors.length + ' failed &mdash; ' + ts + '</span>';
    } else if (fetched > 0) {
      statusEl.innerHTML = '<span style="color:var(--success)">' + fetched + ' stations updated &mdash; ' + ts + '</span>';
    } else {
      statusEl.innerHTML = '<span style="color:var(--text-muted)">No updates &mdash; ' + ts + '</span>';
    }
  } catch (err) {
    console.error('[Overview] Fetch/render failure:', err);
    statusEl.innerHTML = '<span style="color:var(--danger)">Fetch failed: ' + (err && err.message ? err.message : 'Unknown error') + '</span>';
  } finally {
    btn.innerHTML = '&#128752; Fetch Live';
    btn.disabled = false;
  }
}

function renderAllCards() {
  var grid = document.getElementById('tableGrid');
  grid.innerHTML = '';
  if (!TABLES.length) {
    grid.innerHTML = '<div class="loading-text">No devices are enabled. Open Settings and enable at least one station.</div>';
    return;
  }
  for (var i = 0; i < TABLES.length; i++) {
    var table = TABLES[i];
    var entries = tableEntries[table.id];
    var card;
    if (table.id === 'wroom') {
      var wroomSummary = computeWroomSummary(entries);
      card = renderWroomCard(table, wroomSummary);
    } else if (entries && entries.length) {
      var summary = computeSummary(entries);
      card = renderTableCard(table, summary);
    } else {
      card = renderTableCard(table, null);
    }
    grid.appendChild(card);
  }
}

function setupAutoRefresh() {
  if (_autoRefreshTimer) clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = null;
  var mins = 15;  // 15-minute auto-refresh
  var label = document.getElementById('autoRefreshLabel');
  _autoRefreshTimer = setInterval(function() {
    console.log('[Overview] Auto-refresh triggered');
    fetchAllLive();
  }, mins * 60000);
  if (label) label.textContent = 'Auto-refresh: every ' + mins + 'm';
}

// =====================================================================
// INITIALIZATION
// =====================================================================
async function init() {
  document.body.classList.add('loading-state');
  var mainEl = document.querySelector('.main');
  if (mainEl) mainEl.classList.add('loading-state');
  var grid = document.getElementById('tableGrid');
  grid.innerHTML = '<div class="loading-panel"><div class="loading-text"><span class="spinner"></span> Loading table data...</div></div>';

  if (!TABLES.length) {
    renderAllCards();
    document.body.classList.remove('loading-state');
    if (mainEl) mainEl.classList.remove('loading-state');
    setupAutoRefresh();
    return;
  }

  await refreshDeviceStatusMap();

  var loadTasks = TABLES.map(function(table) {
    return loadTableData(table);
  });
  var settled = await Promise.allSettled(loadTasks);

  grid.innerHTML = '';
  for (var i = 0; i < TABLES.length; i++) {
    var table = TABLES[i];
    var s = settled[i];
    var entries = null;
    if (s && s.status === 'fulfilled') {
      entries = s.value;
    } else if (s && s.reason) {
      console.warn('[Overview] Initial load failed for ' + table.id + ':', s.reason);
    }

    if (entries) tableEntries[table.id] = entries;

    var card;
    if (table.id === 'wroom') {
      card = renderWroomCard(table, computeWroomSummary(entries));
    } else {
      card = renderTableCard(table, entries ? computeSummary(entries) : null);
    }
    grid.appendChild(card);
  }

  // Start auto-refresh
  setupAutoRefresh();
  document.body.classList.remove('loading-state');
  if (mainEl) mainEl.classList.remove('loading-state');
}

document.addEventListener('DOMContentLoaded', init);

onDashboardDataRefresh(function(msg) {
  try {
    var ids = Array.isArray(msg && msg.stationIds) ? msg.stationIds : [];
    if (!ids.length) return;
    var changed = false;
    ids.forEach(function(id) {
      var t = TABLES.find(function(x) { return x.id === id; });
      if (!t) return;
      var raw = localStorage.getItem('seaweed_cache_' + id);
      if (!raw) return;
      var cached = JSON.parse(raw);
      var arr = cached && Array.isArray(cached.allEntries) ? cached.allEntries : null;
      if (!arr || !arr.length) return;
      var entries = arr.map(parseEntry).filter(function(e) { return !isNaN(e.timestamp.getTime()); });
      if (!entries.length) return;
      tableEntries[id] = entries;
      _dataSource[id] = cached.source || 'cache';
      changed = true;
    });
    if (changed) {
      refreshDeviceStatusMap().then(function() { renderAllCards(); }).catch(function() { renderAllCards(); });
    }
  } catch (e) {}
});
</script>
