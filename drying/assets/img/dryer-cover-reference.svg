<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Cover Up and Cover Down dryer reference</title>
  <desc id="desc">Front views of a two-bay solar dryer showing the cover rolled up and the cover lowered over the frame.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f7f5"/>
    </linearGradient>
    <linearGradient id="fabric" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".84"/>
      <stop offset=".55" stop-color="#e7f2f2" stop-opacity=".56"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".72"/>
    </linearGradient>
    <pattern id="mesh" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M0 0H12M0 6H12M0 12H12M0 0V12M6 0V12M12 0V12" fill="none" stroke="#35564d" stroke-width=".7" opacity=".65"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#173b32" flood-opacity=".15"/>
    </filter>
    <g id="front-frame" fill="none" stroke="#176b46" stroke-linecap="round" stroke-linejoin="round">
      <path d="M72 140V486M408 140V486M72 140H408" stroke-width="16"/>
      <path d="M72 140L34 286M408 140L446 286" stroke-width="10"/>
      <path d="M52 285H428M52 412H428" stroke-width="16"/>
      <path d="M72 486H408" stroke-width="12"/>
      <rect x="70" y="266" width="340" height="52" rx="4" fill="url(#mesh)" stroke-width="11"/>
      <rect x="70" y="393" width="340" height="52" rx="4" fill="url(#mesh)" stroke-width="11"/>
      <path d="M72 486V520M408 486V520" stroke-width="14"/>
      <path d="M45 520H100M380 520H435" stroke="#8a8f8c" stroke-width="22"/>
    </g>
  </defs>

  <rect width="1200" height="620" rx="24" fill="#f7faf9"/>
  <rect x="18" y="18" width="564" height="584" rx="20" fill="url(#panel)" stroke="#d7e5e0" stroke-width="2"/>
  <rect x="618" y="18" width="564" height="584" rx="20" fill="url(#panel)" stroke="#d7e5e0" stroke-width="2"/>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="300" y="72" fill="#12352c" font-size="34" font-weight="800" letter-spacing="2">COVER UP</text>
    <text x="900" y="72" fill="#12352c" font-size="34" font-weight="800" letter-spacing="2">COVER DOWN</text>
  </g>

  <g transform="translate(60 40)" filter="url(#shadow)">
    <use href="#front-frame"/>
    <path d="M72 142H408" stroke="#d7e3e1" stroke-width="26" stroke-linecap="round"/>
    <path d="M78 142H402" stroke="#ffffff" stroke-width="15" stroke-linecap="round"/>
    <path d="M76 153V244M404 153V244" stroke="#dbe9e6" stroke-width="7" opacity=".8"/>
    <path d="M88 157H392" stroke="#aebfbb" stroke-width="2" stroke-dasharray="6 7" opacity=".7"/>
  </g>

  <g transform="translate(660 40)" filter="url(#shadow)">
    <use href="#front-frame"/>
    <path d="M50 132H430L440 468Q240 485 40 468Z" fill="url(#fabric)" stroke="#b9ccc8" stroke-width="4"/>
    <path d="M54 286H426M46 414H434" stroke="#ffffff" stroke-width="9" opacity=".82"/>
    <path d="M45 469H435" stroke="#dce8e5" stroke-width="25" stroke-linecap="round"/>
    <path d="M55 136H425" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity=".88"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" text-anchor="middle">
    <text x="300" y="580" fill="#42635a">Cover rolled and secured above the bays</text>
    <text x="900" y="580" fill="#42635a">Cover lowered over the dryer frame</text>
  </g>
</svg>
