  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a9aaa4"/>
      <stop offset="0.5" stop-color="#c3c3bd"/>
      <stop offset="1" stop-color="#a9aaa4"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#12362f" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="330" fill="#fbfdfc"/>
  <g filter="url(#softShadow)" stroke="#4b504d" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
