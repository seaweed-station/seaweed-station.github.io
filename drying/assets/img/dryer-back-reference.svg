<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Back Open and Back Closed dryer reference</title>
  <desc id="desc">Side views of a two-bay solar dryer showing the rear flap held open and the rear flap closed against the frame.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f7f5"/>
    </linearGradient>
    <linearGradient id="fabricSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".88"/>
      <stop offset="1" stop-color="#d9ebef" stop-opacity=".62"/>
    </linearGradient>
    <pattern id="meshSide" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M0 0H10M0 5H10M0 10H10M0 0V10M5 0V10M10 0V10" fill="none" stroke="#35564d" stroke-width=".65" opacity=".62"/>
    </pattern>
    <filter id="shadowSide" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#173b32" flood-opacity=".15"/>
    </filter>
    <g id="side-frame" stroke="#176b46" stroke-linecap="round" stroke-linejoin="round">
      <path d="M115 170V486M402 260V486M115 170L402 260" fill="none" stroke-width="16"/>
      <path d="M115 170L130 270H402" fill="url(#fabricSide)" stroke-width="6"/>
      <path d="M115 290H402M115 414H402" fill="none" stroke-width="14"/>
      <rect x="125" y="270" width="265" height="48" rx="4" fill="url(#meshSide)" stroke-width="10"/>
      <rect x="125" y="394" width="265" height="48" rx="4" fill="url(#meshSide)" stroke-width="10"/>
      <path d="M115 486V520M402 486V520" fill="none" stroke-width="14"/>
      <path d="M88 520H142M375 520H429" fill="none" stroke="#8a8f8c" stroke-width="22"/>
    </g>
  </defs>

  <rect width="1200" height="620" rx="24" fill="#f7faf9"/>
  <rect x="18" y="18" width="564" height="584" rx="20" fill="url(#panel)" stroke="#d7e5e0" stroke-width="2"/>
  <rect x="618" y="18" width="564" height="584" rx="20" fill="url(#panel)" stroke="#d7e5e0" stroke-width="2"/>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="300" y="72" fill="#12352c" font-size="34" font-weight="800" letter-spacing="2">BACK OPEN</text>
    <text x="900" y="72" fill="#12352c" font-size="34" font-weight="800" letter-spacing="2">BACK CLOSED</text>
  </g>

  <g transform="translate(65 40)" filter="url(#shadowSide)">
    <use href="#side-frame"/>
    <path d="M115 174L26 400L52 412L126 270Z" fill="url(#fabricSide)" stroke="#aac3c4" stroke-width="4"/>
    <path d="M115 174L25 401" fill="none" stroke="#176b46" stroke-width="13"/>
    <path d="M34 397H69" stroke="#8a8f8c" stroke-width="18"/>
    <path d="M108 175L36 388" fill="none" stroke="#ffffff" stroke-width="7" opacity=".7"/>
  </g>

  <g transform="translate(665 40)" filter="url(#shadowSide)">
    <use href="#side-frame"/>
    <path d="M104 174H128V472H104Z" fill="url(#fabricSide)" stroke="#aac3c4" stroke-width="4"/>
    <path d="M115 176V470" fill="none" stroke="#176b46" stroke-width="13"/>
    <path d="M122 182V462" fill="none" stroke="#ffffff" stroke-width="6" opacity=".72"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" text-anchor="middle">
    <text x="300" y="580" fill="#42635a">Rear flap lifted away from the dryer</text>
    <text x="900" y="580" fill="#42635a">Rear flap secured against the frame</text>
  </g>
</svg>
