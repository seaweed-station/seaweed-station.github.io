name: Download Station Data

on:
  schedule:
    # Runs daily at 06:00 UTC (CI backup; dashboards now fetch live from Supabase)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the committed data files
      issues: write     # needed to open/close alert issues

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run download_data_supabase.ps1
        shell: pwsh
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          Write-Host "=== Starting Supabase data download ===" -ForegroundColor Cyan
          ./download_data_supabase.ps1 -ScheduleType hourly
          Write-Host "=== Download complete ===" -ForegroundColor Green

      - name: Commit and push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all data subfolder files
          git add data/

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "data: auto-update station data ${TIMESTAMP}"

            # Pull any remote changes (e.g. manual pushes) before pushing
            # Use rebase to keep data commits on top and avoid merge conflicts
            for i in 1 2 3; do
              git pull --rebase origin main && break
              echo "Pull attempt $i failed, retrying..."
              sleep 5
            done

            git push
            echo "Data committed and pushed."
          fi

      - name: Check alerts and open/close GitHub Issues
        if: always()   # run even if download or commit step fails
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          Write-Host "=== Running alert checks ===" -ForegroundColor Cyan
          ./check_alerts_supabase.ps1
          Write-Host "=== Alert checks complete ===" -ForegroundColor Green
