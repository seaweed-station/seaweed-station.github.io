<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seaweed Station Health Redirect</title>
<script>
(function() {
  var params = new URLSearchParams(location.search);
  var station = params.get('station') || params.get('table') || '';
  var destination = '../v4/station_health.html';
  if (station) destination += '?station=' + encodeURIComponent(station);
  location.replace(destination + location.hash);
})();
</script>
</head>
<body>
  <p>Station Health has moved to <a href="../v4/station_health.html">V4 Station Health</a>.</p>
</body>
</html>
