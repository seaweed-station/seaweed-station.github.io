<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Seaweed Station Dashboard</title>
<script>
  (function() {
    var params = new URLSearchParams(location.search);
    var requested = params.get('r') || 'overview.html';
    var destination = new URL(requested, location.href).href;
    location.replace('../login.html?r=' + encodeURIComponent(destination));
  })();
</script>
</head>
<body>
  <p>Opening Seaweed Station login...</p>
</body>
</html>
